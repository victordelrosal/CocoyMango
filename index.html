<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Coco y Mango — Historias y Juegos</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦎</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#065f46">
  <meta property="og:image" content="https://victordelrosal.github.io/CocoyMango/imagenes/preview.png">
  <meta property="og:title" content="Las Aventuras de Coco y Mango">
  <meta property="og:description" content="Historias y juegos para niños — 13 aventuras de dos lagartijas en México">
  <meta property="og:url" content="https://victordelrosal.com/CocoyMango">
  <meta property="og:type" content="website">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Fredoka"', 'system-ui', 'sans-serif'],
            body: ['"Comic Neue"', 'cursive'],
            reading: ['"Literata"', 'Georgia', 'serif'],
          },
          colors: {
            coco: { 50:'#f0fdf4', 100:'#dcfce7', 200:'#bbf7d0', 500:'#22c55e', 600:'#16a34a', 700:'#15803d', 800:'#166534', 900:'#14532d' },
            mango: { 50:'#fffbeb', 100:'#fef3c7', 200:'#fde68a', 400:'#fbbf24', 500:'#f59e0b', 600:'#d97706' },
            ink: { 50:'#fafaf9', 100:'#f5f5f4', 800:'#1c1917', 900:'#0c0a09', 950:'#0a0a0a' },
          },
        },
      },
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Courier+Prime&family=Fredoka:wght@300;400;500;600;700&family=Literata:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body { font-family: 'Comic Neue', cursive; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; overflow-x: hidden; }

    /* ── Animations ── */
    @keyframes float { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(-12px) } }
    @keyframes floatSlow { 0%,100%{ transform: translateY(0) rotate(0deg) } 50%{ transform: translateY(-8px) rotate(3deg) } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:translateY(0) } }
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
    @keyframes scaleIn { from { opacity:0; transform:scale(0.92) } to { opacity:1; transform:scale(1) } }
    @keyframes shimmer { 0% { background-position: -200% center } 100% { background-position: 200% center } }
    @keyframes pulse-ring { 0% { transform:scale(1); opacity:0.4 } 100% { transform:scale(1.4); opacity:0 } }
    @keyframes wiggle { 0%,100%{ transform:rotate(0deg) } 25%{ transform:rotate(-3deg) } 75%{ transform:rotate(3deg) } }
    @keyframes slideUp { from { transform:translateY(100%); opacity:0 } to { transform:translateY(0); opacity:1 } }

    .anim-float { animation: float 4s ease-in-out infinite; }
    .anim-float-slow { animation: floatSlow 6s ease-in-out infinite; }
    .anim-fade-up { animation: fadeUp 0.6s cubic-bezier(.22,1,.36,1) both; }
    .anim-fade-in { animation: fadeIn 0.5s ease both; }
    .anim-scale-in { animation: scaleIn 0.5s cubic-bezier(.22,1,.36,1) both; }
    .anim-wiggle { animation: wiggle 2s ease-in-out infinite; }
    .anim-slide-up { animation: slideUp 0.4s cubic-bezier(.22,1,.36,1) both; }

    .stagger > * { animation: fadeUp 0.5s cubic-bezier(.22,1,.36,1) both; }
    .stagger > *:nth-child(1) { animation-delay:0.04s } .stagger > *:nth-child(2) { animation-delay:0.08s }
    .stagger > *:nth-child(3) { animation-delay:0.12s } .stagger > *:nth-child(4) { animation-delay:0.16s }
    .stagger > *:nth-child(5) { animation-delay:0.20s } .stagger > *:nth-child(6) { animation-delay:0.24s }
    .stagger > *:nth-child(7) { animation-delay:0.28s } .stagger > *:nth-child(8) { animation-delay:0.32s }
    .stagger > *:nth-child(9) { animation-delay:0.36s } .stagger > *:nth-child(10){ animation-delay:0.40s }
    .stagger > *:nth-child(11){ animation-delay:0.44s } .stagger > *:nth-child(12){ animation-delay:0.48s }
    .stagger > *:nth-child(13){ animation-delay:0.52s }

    /* ── Glass ── */
    .glass { background:rgba(255,255,255,0.72); backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%); }
    .glass-dark { background:rgba(10,10,10,0.78); backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%); }

    /* ── Card ── */
    .card {
      transition: transform 0.4s cubic-bezier(.22,1,.36,1), box-shadow 0.4s ease;
      will-change: transform;
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 24px 48px -12px rgba(0,0,0,0.18);
    }
    .card:active { transform: translateY(-2px) scale(0.98); }

    .card .card-img {
      transition: transform 0.6s cubic-bezier(.22,1,.36,1);
    }
    .card:hover .card-img { transform: scale(1.06); }

    /* ── Reading progress ── */
    .progress-bar {
      background: linear-gradient(90deg, #22c55e, #fbbf24, #f97316);
      box-shadow: 0 0 12px rgba(34,197,94,0.4);
    }

    /* ── Shimmer text ── */
    .shimmer-text {
      background: linear-gradient(110deg, #fff 0%, #fff 40%, #fde68a 50%, #fff 60%, #fff 100%);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s ease-in-out infinite;
    }

    /* ── Reading fonts ── */
    .font-reading { font-family: 'Literata', Georgia, serif; }
    .font-body { font-family: 'Comic Neue', cursive; }
    .font-mono { font-family: 'Courier Prime', 'Courier New', monospace; }

    /* ── Drop cap ── */
    .drop-cap::first-letter {
      float: left;
      font-family: 'Fredoka', sans-serif;
      font-size: 3.2em;
      line-height: 0.8;
      padding-right: 8px;
      padding-top: 4px;
      color: #16a34a;
      font-weight: 600;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }

    /* ── Badge pulse ── */
    .badge-live::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: inherit;
      animation: pulse-ring 2s cubic-bezier(0.4,0,0.6,1) infinite;
      border: 2px solid #22c55e;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // ═══════════════════════════════════════════════════════════
    //  DATA
    // ═══════════════════════════════════════════════════════════
    const STORIES = Array.from({ length: 24 }, (_, i) => ({
      id: i,
      num: String(i + 1).padStart(2, '0'),
      jsonFile: `historias/historia${String(i + 1).padStart(2, '0')}.json`,
      imgFile: `imagenes/imagen${String(i + 1).padStart(2, '0')}.png`,
    }));

    // One game per episode. kind/emoji mirror the templates in juegos/jugar.html.
    const GAME_KIND = {
      1:['Atrapa','🧺'], 2:['Toca','👆'], 3:['Atrapa','🧺'], 4:['Toca','👆'], 5:['Atrapa','🧺'],
      6:['Memorama','🧠'], 7:['Memorama','🧠'], 8:['Atrapa','🧺'], 9:['Memorama','🧠'], 10:['Toca','👆'],
      11:['Atrapa','🧺'], 12:['Toca','👆'], 13:['Atrapa','🧺'], 14:['Toca','👆'], 15:['Toca','👆'],
      16:['Atrapa','🧺'], 17:['Atrapa','🧺'], 18:['Memorama','🧠'], 19:['Atrapa','🧺'], 20:['Toca','👆'],
      21:['Atrapa','🧺'], 22:['Atrapa','🧺'], 23:['Toca','👆'],
    };

    // Comics: each story becomes a comic. Add a cover here as each comic ships.
    const COMIC_COVERS = {
      '01': 'comics/ep01/panel02.png',
      '02': 'comics/ep02/panel06.png',
      '03': 'comics/ep03/panel07.png',
      '04': 'comics/ep04/panel06.png',
    };
    const COMICS = STORIES.map((s) => {
      const ready = !!COMIC_COVERS[s.num];
      return {
        num: s.num,
        ready,
        href: `comics/comic${s.num}.html`,
        cover: ready ? COMIC_COVERS[s.num] : s.imgFile,
      };
    });
    const comicsReady = COMICS.filter(c => c.ready).length;

    // ═══════════════════════════════════════════════════════════
    //  SMALL COMPONENTS
    // ═══════════════════════════════════════════════════════════
    const HitCounter = () => (
      <a href="https://www.freecounterstat.com" className="opacity-40 hover:opacity-70 transition-opacity inline-block">
        <img src="https://counter6.optistats.ovh/private/freecounterstat.php?c=kp79913cu5eaprplb72mlga1n4hfduja" alt="counter" className="h-3" />
      </a>
    );

    const Icon = ({ d, className = "w-5 h-5" }) => (
      <svg className={className} fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24">
        <path d={d} />
      </svg>
    );

    // ═══════════════════════════════════════════════════════════
    //  HERO
    // ═══════════════════════════════════════════════════════════
    const Hero = ({ dark }) => (
      <header className="relative overflow-hidden">
        {/* Rich gradient background */}
        <div className={`absolute inset-0 ${dark
          ? 'bg-gradient-to-br from-ink-950 via-coco-900 to-ink-950'
          : 'bg-gradient-to-br from-coco-600 via-coco-500 to-mango-400'
        }`} />

        {/* Noise texture overlay */}
        <div className="absolute inset-0 opacity-[0.03]" style={{backgroundImage:'url("data:image/svg+xml,%3Csvg viewBox=%270 0 256 256%27 xmlns=%27http://www.w3.org/2000/svg%27%3E%3Cfilter id=%27noise%27%3E%3CfeTurbulence type=%27fractalNoise%27 baseFrequency=%270.9%27 numOctaves=%274%27 stitchTiles=%27stitch%27/%3E%3C/filter%3E%3Crect width=%27100%25%27 height=%27100%25%27 filter=%27url(%23noise)%27/%3E%3C/svg%3E")'}} />

        {/* Floating decorative elements */}
        <div className="absolute top-8 left-[8%] text-4xl anim-float opacity-30" style={{animationDelay:'0s'}}>🌿</div>
        <div className="absolute top-16 right-[12%] text-3xl anim-float-slow opacity-25" style={{animationDelay:'1s'}}>🌸</div>
        <div className="absolute bottom-6 left-[15%] text-2xl anim-float opacity-20" style={{animationDelay:'2s'}}>🦋</div>
        <div className="absolute bottom-10 right-[8%] text-3xl anim-float-slow opacity-25" style={{animationDelay:'0.5s'}}>🌺</div>
        <div className="absolute top-[40%] left-[3%] text-2xl anim-float opacity-15" style={{animationDelay:'1.5s'}}>✨</div>

        {/* Gradient orbs */}
        <div className="absolute -top-32 -right-32 w-96 h-96 bg-mango-400/20 rounded-full blur-[80px]" />
        <div className="absolute -bottom-24 -left-24 w-80 h-80 bg-coco-200/15 rounded-full blur-[60px]" />

        <div className="relative max-w-5xl mx-auto px-5 pt-12 pb-8 sm:pt-16 sm:pb-10 text-center">
          {/* Avatar */}
          <div className="anim-scale-in mx-auto mb-6">
            <div className="relative inline-block">
              <div className="w-32 h-32 sm:w-40 sm:h-40 rounded-[2rem] overflow-hidden shadow-2xl ring-4 ring-white/30 anim-wiggle" style={{animationDuration:'6s'}}>
                <img src="imagenes/preview.png" alt="Coco y Mango" className="w-full h-full object-cover" />
              </div>
              {/* Floating badge */}
              <div className="absolute -bottom-2 -right-2 bg-mango-400 text-ink-900 text-xs font-bold px-2.5 py-1 rounded-full shadow-lg font-display">
                {STORIES.length} historias
              </div>
            </div>
          </div>

          {/* Title */}
          <h1 className="font-display font-bold text-white drop-shadow-lg anim-fade-up" style={{animationDelay:'0.15s'}}>
            <span className="block text-lg sm:text-xl font-medium opacity-80 mb-1">Las Aventuras de</span>
            <span className="shimmer-text text-5xl sm:text-7xl tracking-tight">Coco y Mango</span>
          </h1>

          {/* Subtitle */}
          <p className="mt-4 text-white/70 text-sm sm:text-base font-display font-medium max-w-md mx-auto anim-fade-up leading-relaxed" style={{animationDelay:'0.25s'}}>
            Dos lagartijas, un pueblo en México, y mil aventuras por vivir.
            <br className="hidden sm:block" />
            Lee las historias. Juega los juegos.
          </p>
        </div>

        {/* Curved bottom edge */}
        <div className="absolute bottom-0 left-0 right-0">
          <svg viewBox="0 0 1440 48" fill="none" className="w-full" preserveAspectRatio="none">
            <path d="M0 48h1440V24C1200 0 960 40 720 40S240 0 0 24v24z" fill={dark ? '#0a0a0a' : '#fafaf9'} />
          </svg>
        </div>
      </header>
    );

    // ═══════════════════════════════════════════════════════════
    //  TABS
    // ═══════════════════════════════════════════════════════════
    const TabBar = ({ active, onChange, dark }) => {
      const tabs = [
        { key:'historias', icon:'📖', label:'Historias', badge: String(STORIES.length) },
        { key:'comics', icon:'💥', label:'Cómics', badge: 'Nuevo' },
        { key:'juegos', icon:'🎮', label:'Juegos', badge: String(STORIES.length) },
      ];
      return (
        <nav className={`sticky top-0 z-40 border-b transition-colors ${dark ? 'glass-dark border-white/5' : 'glass border-ink-100/60'}`}>
          <div className="max-w-5xl mx-auto px-4 flex">
            {tabs.map(t => {
              const isActive = active === t.key;
              return (
                <button
                  key={t.key}
                  onClick={() => onChange(t.key)}
                  className={`relative flex-1 py-3.5 flex items-center justify-center gap-2 text-sm sm:text-base font-display font-semibold transition-colors ${
                    isActive ? (dark ? 'text-coco-500' : 'text-coco-700') : (dark ? 'text-gray-500 hover:text-gray-300' : 'text-gray-400 hover:text-gray-600')
                  }`}
                >
                  <span>{t.icon}</span>
                  <span>{t.label}</span>
                  <span className={`text-[10px] px-1.5 py-0.5 rounded-full font-bold ${
                    isActive
                      ? (dark ? 'bg-coco-500/20 text-coco-400' : 'bg-coco-100 text-coco-700')
                      : (dark ? 'bg-white/5 text-gray-500' : 'bg-gray-100 text-gray-400')
                  }`}>{t.badge}</span>
                  {isActive && (
                    <span className={`absolute bottom-0 inset-x-[15%] h-[3px] rounded-full ${dark ? 'bg-coco-500' : 'bg-coco-600'}`} />
                  )}
                </button>
              );
            })}
          </div>
        </nav>
      );
    };

    // ═══════════════════════════════════════════════════════════
    //  STORY CARD
    // ═══════════════════════════════════════════════════════════
    const StoryCard = ({ story, title, index, dark, onClick }) => {
      const [imgError, setImgError] = useState(false);
      return (
      <article onClick={onClick} className={`card cursor-pointer rounded-2xl overflow-hidden ${dark ? 'bg-ink-900 ring-1 ring-white/5' : 'bg-white ring-1 ring-black/[0.04]'}`}>
        <div className="relative aspect-[4/3] overflow-hidden">
          {imgError ? (
            <div className="w-full h-full flex flex-col items-center justify-center gap-1 bg-red-50 text-red-600 p-2 text-center">
              <span className="text-2xl">\u26A0\uFE0F</span>
              <span className="font-display font-bold text-[11px] leading-tight">Falta la ilustraci\u00F3n</span>
              <span className="font-mono text-[9px] opacity-70 break-all">{story.imgFile}</span>
            </div>
          ) : (
            <img src={story.imgFile} alt={title} className="card-img w-full h-full object-cover" loading="lazy"
              onError={() => { console.error(`[Coco y Mango] Falta la imagen de la historia ${index + 1}: ${story.imgFile}`); setImgError(true); }} />
          )}
          {/* Number badge */}
          <div className="absolute top-2.5 left-2.5">
            <div className="w-8 h-8 rounded-xl bg-black/40 backdrop-blur-md flex items-center justify-center text-white text-xs font-display font-bold ring-1 ring-white/10">
              {index + 1}
            </div>
          </div>
          {/* Bottom gradient fade */}
          <div className="absolute inset-x-0 bottom-0 h-16 bg-gradient-to-t from-black/40 to-transparent" />
        </div>
        <div className="p-3.5 sm:p-4">
          <h3 className={`font-display font-semibold text-[13px] sm:text-[15px] leading-snug ${dark ? 'text-white' : 'text-ink-800'}`}>
            {title || '\u00A0'}
          </h3>
          <div className="flex items-center gap-1.5 mt-2">
            <span className={`inline-block w-1.5 h-1.5 rounded-full ${dark ? 'bg-coco-500' : 'bg-coco-400'}`} />
            <span className={`text-[11px] font-display font-medium ${dark ? 'text-gray-500' : 'text-gray-400'}`}>
              Episodio {index + 1}
            </span>
          </div>
        </div>
      </article>
      );
    };

    // ═══════════════════════════════════════════════════════════
    //  GAME CARD (one game per episode → juegos/jugar.html?ep=N)
    // ═══════════════════════════════════════════════════════════
    const GameCard = ({ story, title, index, dark }) => {
      const ep = index + 1;
      const kind = GAME_KIND[ep] || ['Jugar','🎮'];
      return (
        <a href={`juegos/jugar.html?ep=${ep}`}
          className={`card block cursor-pointer rounded-2xl overflow-hidden ${dark ? 'bg-ink-900 ring-1 ring-white/5' : 'bg-white ring-1 ring-black/[0.04]'}`}>
          <div className="relative aspect-[4/3] overflow-hidden">
            <img src={story.imgFile} alt={title} className="card-img w-full h-full object-cover" loading="lazy" />
            <div className="absolute top-2.5 left-2.5 w-8 h-8 rounded-xl bg-black/40 backdrop-blur-md flex items-center justify-center text-white text-xs font-display font-bold ring-1 ring-white/10">
              {ep}
            </div>
            <div className="absolute top-2.5 right-2.5 w-10 h-10 rounded-xl bg-white/85 backdrop-blur-md flex items-center justify-center text-xl shadow-sm ring-1 ring-black/5">
              {kind[1]}
            </div>
            <div className="absolute inset-0 flex items-center justify-center bg-black/0 hover:bg-black/30 transition-colors duration-300 group">
              <div className="w-14 h-14 rounded-full bg-white/90 flex items-center justify-center shadow-xl opacity-0 group-hover:opacity-100 scale-75 group-hover:scale-100 transition-all duration-300">
                <svg className="w-6 h-6 text-coco-600 ml-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              </div>
            </div>
            <div className="absolute inset-x-0 bottom-0 h-14 bg-gradient-to-t from-black/35 to-transparent pointer-events-none" />
          </div>
          <div className="p-3.5 sm:p-4">
            <h3 className={`font-display font-semibold text-[13px] sm:text-[15px] leading-snug ${dark ? 'text-white' : 'text-ink-800'}`}>
              {title || ' '}
            </h3>
            <div className="flex items-center gap-2 mt-2">
              <span className={`text-[10px] font-display font-semibold px-2 py-0.5 rounded-full ${dark ? 'bg-white/5 text-gray-400' : 'bg-ink-100 text-gray-500'}`}>
                {kind[0]}
              </span>
              <span className="relative text-[10px] font-display font-bold px-2 py-0.5 rounded-full bg-coco-500/10 text-coco-600 badge-live">
                Jugar
              </span>
            </div>
          </div>
        </a>
      );
    };

    // ═══════════════════════════════════════════════════════════
    //  COMIC CARD
    // ═══════════════════════════════════════════════════════════
    const ComicCard = ({ comic, title, index, dark }) => (
      <a
        href={comic.ready ? comic.href : undefined}
        onClick={e => { if (!comic.ready) e.preventDefault(); }}
        className={`card block rounded-2xl overflow-hidden ${dark ? 'bg-ink-900 ring-1 ring-white/5' : 'bg-white ring-1 ring-black/[0.04]'} ${!comic.ready ? 'opacity-50 saturate-50 cursor-not-allowed' : 'cursor-pointer'}`}
      >
        <div className="relative aspect-[4/3] overflow-hidden">
          <img src={comic.cover} alt={title} className="card-img w-full h-full object-cover" loading="lazy" />
          <div className="absolute top-2.5 left-2.5 w-8 h-8 rounded-xl bg-black/40 backdrop-blur-md flex items-center justify-center text-white text-xs font-display font-bold ring-1 ring-white/10">
            {index + 1}
          </div>
          {comic.ready ? (
            <div className="absolute top-2.5 right-2.5 text-[10px] font-display font-bold px-2.5 py-1 rounded-full bg-mango-400 text-ink-900 shadow-lg">💥 Cómic</div>
          ) : (
            <div className="absolute inset-x-0 bottom-0 p-2.5">
              <span className="text-[10px] font-display font-semibold bg-black/50 text-white/80 px-2.5 py-1 rounded-full backdrop-blur-md">Próximamente</span>
            </div>
          )}
          <div className="absolute inset-x-0 bottom-0 h-16 bg-gradient-to-t from-black/40 to-transparent pointer-events-none" />
        </div>
        <div className="p-3.5 sm:p-4">
          <h3 className={`font-display font-semibold text-[13px] sm:text-[15px] leading-snug ${dark ? 'text-white' : 'text-ink-800'}`}>
            {title || ' '}
          </h3>
          <div className="flex items-center gap-1.5 mt-2">
            <span className={`inline-block w-1.5 h-1.5 rounded-full ${dark ? 'bg-mango-400' : 'bg-mango-500'}`} />
            <span className={`text-[11px] font-display font-medium ${comic.ready ? (dark ? 'text-mango-400' : 'text-mango-600') : (dark ? 'text-gray-500' : 'text-gray-400')}`}>
              {comic.ready ? 'Leer cómic →' : `Episodio ${index + 1}`}
            </span>
          </div>
        </div>
      </a>
    );

    // ═══════════════════════════════════════════════════════════
    //  STORY READER
    // ═══════════════════════════════════════════════════════════
    const Reader = ({ story, index, title, content, loading, dark, onBack, onNav, total }) => {
      const [fs, setFs] = useState(1);
      const [ff, setFf] = useState(0);
      const [progress, setProgress] = useState(0);
      const [imgError, setImgError] = useState(false);

      const sizes = ['text-base leading-7', 'text-lg leading-8', 'text-xl leading-9', 'text-2xl leading-10'];
      const fonts = [
        { cls: 'font-reading', label: 'Serif' },
        { cls: 'font-body', label: 'Comic' },
        { cls: 'font-display', label: 'Fredoka' },
        { cls: 'font-mono', label: 'Mono' },
      ];

      useEffect(() => {
        const onScroll = () => {
          const p = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight);
          setProgress(Math.min(1, Math.max(0, p)) * 100);
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      useEffect(() => { window.scrollTo({ top: 0 }); setImgError(false); }, [index]);

      return (
        <div className={`min-h-screen transition-colors duration-300 ${dark ? 'bg-ink-950' : 'bg-ink-50'}`}>
          {/* Progress bar */}
          <div className="fixed top-0 left-0 right-0 h-[3px] z-50">
            <div className="progress-bar h-full transition-[width] duration-100" style={{ width: `${progress}%` }} />
          </div>

          {/* Toolbar */}
          <div className={`sticky top-0 z-40 border-b transition-colors ${dark ? 'glass-dark border-white/5' : 'glass border-ink-100/50'}`}>
            <div className="max-w-2xl mx-auto px-4 h-12 flex items-center justify-between">
              <div className="flex items-center gap-2 min-w-0">
                <button onClick={onBack} className={`shrink-0 w-8 h-8 rounded-full flex items-center justify-center transition-colors ${dark ? 'hover:bg-white/10' : 'hover:bg-black/5'}`}>
                  <Icon d="M10 19l-7-7m0 0l7-7m-7 7h18" className={`w-[18px] h-[18px] ${dark ? 'text-gray-400' : 'text-gray-500'}`} />
                </button>
                <span className={`text-xs font-display font-medium truncate ${dark ? 'text-gray-500' : 'text-gray-400'}`}>
                  {index + 1} / {total}
                </span>
              </div>
              <div className="flex items-center gap-0.5">
                <button onClick={() => setFf(f => (f + 1) % fonts.length)}
                  className={`h-8 px-2.5 rounded-full flex items-center justify-center text-[11px] font-bold transition-colors ${dark ? 'hover:bg-white/10 text-gray-400 bg-white/5' : 'hover:bg-black/5 text-gray-500 bg-black/[0.03]'}`}>
                  {fonts[ff].label}
                </button>
                <button onClick={() => setFs(s => Math.max(0, s-1))} disabled={fs===0}
                  className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition-colors disabled:opacity-20 ${dark ? 'hover:bg-white/10 text-gray-400' : 'hover:bg-black/5 text-gray-500'}`}>
                  A-
                </button>
                <button onClick={() => setFs(s => Math.min(sizes.length-1, s+1))} disabled={fs===sizes.length-1}
                  className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold transition-colors disabled:opacity-20 ${dark ? 'hover:bg-white/10 text-gray-400' : 'hover:bg-black/5 text-gray-500'}`}>
                  A+
                </button>
              </div>
            </div>
          </div>

          {/* Content */}
          <article className="max-w-2xl mx-auto px-5 pt-8 pb-36">
            {/* Image */}
            <div className="rounded-2xl overflow-hidden shadow-xl ring-1 ring-black/5 mb-8 anim-scale-in">
              {imgError ? (
                <div className="w-full aspect-[4/3] flex flex-col items-center justify-center gap-2 bg-red-50 text-red-600 p-6 text-center">
                  <span className="text-4xl">⚠️</span>
                  <span className="font-display font-bold text-base">Falta la ilustración de esta historia</span>
                  <span className="font-mono text-xs opacity-70 break-all">{story.imgFile}</span>
                </div>
              ) : (
                <img src={story.imgFile} alt={title} className="w-full h-auto"
                  onError={() => { console.error(`[Coco y Mango] Falta la imagen de la historia ${index + 1}: ${story.imgFile}`); setImgError(true); }} />
              )}
            </div>

            {/* Title */}
            <h1 className={`font-display font-bold text-center mb-10 anim-fade-up ${dark ? 'text-white' : 'text-ink-900'}`} style={{animationDelay:'0.1s', fontSize:'clamp(1.5rem, 5vw, 2.5rem)', lineHeight:1.2}}>
              {title}
            </h1>

            {/* Story text */}
            {loading ? (
              <div className="flex justify-center py-24">
                <div className="w-6 h-6 rounded-full border-2 border-coco-500 border-t-transparent animate-spin" />
              </div>
            ) : (
              <div className={`${fonts[ff].cls} ${sizes[fs]} ${dark ? 'text-gray-300' : 'text-ink-800'}`}>
                {content && content.map((p, i) => (
                  <p key={i}
                    className={`mb-6 anim-fade-up ${i === 0 ? 'drop-cap' : ''}`}
                    style={{animationDelay: `${0.05 * Math.min(i, 8)}s`}}
                  >
                    {p}
                  </p>
                ))}
                {/* Fin ornament */}
                <div className={`text-center pt-8 pb-2 font-display text-sm font-medium tracking-widest uppercase ${dark ? 'text-gray-600' : 'text-gray-300'}`}>
                  — fin —
                </div>
                {/* Read-as-comic CTA (only when this story has a published comic) */}
                {COMICS[index] && COMICS[index].ready && (
                  <div className="text-center pt-8">
                    <a href={COMICS[index].href}
                      className="inline-flex items-center gap-2 px-5 py-3 rounded-full font-display font-bold text-white bg-gradient-to-r from-mango-500 to-orange-500 shadow-lg shadow-mango-500/30 hover:scale-105 active:scale-95 transition-transform">
                      💥 Leer este cuento como cómic
                    </a>
                  </div>
                )}
              </div>
            )}
          </article>

          {/* Bottom nav */}
          <div className={`fixed bottom-0 inset-x-0 z-40 border-t transition-colors ${dark ? 'glass-dark border-white/5' : 'glass border-ink-100/50'}`}>
            <div className="max-w-2xl mx-auto px-4 h-14 flex items-center justify-between">
              <button
                onClick={() => onNav(index - 1)} disabled={index === 0}
                className={`flex items-center gap-1.5 px-3.5 py-2 rounded-full text-sm font-display font-semibold transition-all disabled:opacity-25 ${dark ? 'text-gray-300 hover:bg-white/5' : 'text-gray-600 hover:bg-black/5'}`}
              >
                <Icon d="M15 19l-7-7 7-7" className="w-4 h-4" />
                <span className="hidden sm:inline">Anterior</span>
              </button>

              <div className="flex items-center gap-1">
                {STORIES.map((_, i) => (
                  <button key={i} onClick={() => onNav(i)}
                    className={`w-2 h-2 rounded-full transition-all ${i === index ? (dark ? 'bg-coco-500 w-5' : 'bg-coco-600 w-5') : (dark ? 'bg-white/10 hover:bg-white/20' : 'bg-black/10 hover:bg-black/20')}`}
                  />
                ))}
              </div>

              <button
                onClick={() => onNav(index + 1)} disabled={index === total - 1}
                className="flex items-center gap-1.5 px-4 py-2 rounded-full text-sm font-display font-semibold bg-coco-600 hover:bg-coco-700 text-white shadow-md shadow-coco-600/25 transition-all disabled:opacity-25 disabled:shadow-none"
              >
                <span className="hidden sm:inline">Siguiente</span>
                <Icon d="M9 5l7 7-7 7" className="w-4 h-4" />
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ═══════════════════════════════════════════════════════════
    //  APP
    // ═══════════════════════════════════════════════════════════
    const App = () => {
      const [tab, setTab] = useState('historias');
      const [story, setStory] = useState(-1);
      const [titles, setTitles] = useState({});
      const [content, setContent] = useState(null);
      const [title, setTitle] = useState('');
      const [loading, setLoading] = useState(false);
      const [dark, setDark] = useState(() => window.matchMedia?.('(prefers-color-scheme: dark)').matches ?? false);

      useEffect(() => {
        Promise.all(STORIES.map(async (s, i) => {
          try { const d = await (await fetch(s.jsonFile)).json(); return [i, d.title]; }
          catch { return [i, null]; }
        })).then(results => {
          const t = {};
          results.forEach(([i, v]) => { if (v) t[i] = v; });
          setTitles(t);
        });
      }, []);

      useEffect(() => {
        if (story < 0) { setContent(null); setTitle(''); return; }
        setLoading(true);
        fetch(STORIES[story].jsonFile).then(r => r.json())
          .then(d => { setContent(d.content); setTitle(d.title); setLoading(false); })
          .catch(() => { setContent(['Error al cargar la historia.']); setTitle('Error'); setLoading(false); });
      }, [story]);

      useEffect(() => {
        document.documentElement.style.background = dark ? '#0a0a0a' : '#fafaf9';
        document.body.style.background = dark ? '#0a0a0a' : '#fafaf9';
      }, [dark]);

      if (story >= 0) {
        return <Reader story={STORIES[story]} index={story} title={title} content={content} loading={loading}
          dark={dark} onBack={() => setStory(-1)} onNav={i => { if (i >= 0 && i < STORIES.length) setStory(i); }} total={STORIES.length} />;
      }

      return (
        <div className={`min-h-screen transition-colors duration-300 ${dark ? 'bg-ink-950' : 'bg-ink-50'}`}>
          {/* Home logo - top left */}
          <a href="index.html"
            className={`fixed top-3.5 left-3.5 z-50 w-9 h-9 rounded-full overflow-hidden shadow-lg ring-1 transition-all hover:scale-110 ${
              dark ? 'ring-white/10 hover:ring-white/20' : 'ring-black/5 hover:ring-black/10'}`}
          >
            <img src="imagenes/preview.png" alt="Inicio" className="w-full h-full object-cover" />
          </a>

          {/* Dark toggle */}
          <button onClick={() => setDark(d => !d)}
            className={`fixed top-3.5 right-3.5 z-50 w-9 h-9 rounded-full flex items-center justify-center shadow-lg ring-1 transition-all ${
              dark ? 'bg-ink-900 ring-white/10 hover:ring-white/20 text-mango-400' : 'bg-white ring-black/5 hover:ring-black/10 text-gray-500'}`}
          >
            {dark
              ? <Icon d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" className="w-4 h-4" />
              : <Icon d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" className="w-4 h-4" />
            }
          </button>

          <Hero dark={dark} />
          <TabBar active={tab} onChange={setTab} dark={dark} />

          <main className="max-w-5xl mx-auto px-4 sm:px-6 py-6 sm:py-8">
            {tab === 'historias' && (
              <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3.5 sm:gap-5 stagger">
                {STORIES.map((s, i) => (
                  <StoryCard key={s.id} story={s} title={titles[i]} index={i} dark={dark} onClick={() => setStory(i)} />
                ))}
              </div>
            )}
            {tab === 'comics' && (
              <div>
                <div className={`mb-5 sm:mb-6 rounded-2xl p-4 sm:p-5 text-center ${dark ? 'bg-mango-400/10 ring-1 ring-mango-400/20' : 'bg-mango-50 ring-1 ring-mango-200'}`}>
                  <p className={`font-display font-semibold text-sm sm:text-base ${dark ? 'text-mango-300' : 'text-mango-700'}`}>
                    💥 ¡Las historias ahora también son cómics!
                  </p>
                  <p className={`font-display text-xs mt-1 ${dark ? 'text-gray-400' : 'text-gray-500'}`}>
                    Empezamos con el Episodio 1. Iremos publicando uno por uno.
                  </p>
                </div>
                <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3.5 sm:gap-5 stagger">
                  {COMICS.map((c, i) => (
                    <ComicCard key={c.num} comic={c} title={titles[i]} index={i} dark={dark} />
                  ))}
                </div>
              </div>
            )}
            {tab === 'juegos' && (
              <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3.5 sm:gap-5 stagger">
                {STORIES.map((s, i) => (
                  <GameCard key={s.id} story={s} title={titles[i]} index={i} dark={dark} />
                ))}
              </div>
            )}
          </main>

          <footer className={`text-center py-10 px-4 ${dark ? 'text-gray-600' : 'text-gray-300'}`}>
            <p className="font-display text-xs font-medium tracking-wide">
              🦎 Coco y Mango · Hecho con amor en México 🇲🇽
            </p>
            <div className="mt-2"><HitCounter /></div>
          </footer>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
