<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Los Juegos de Coco y Mango</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta property="og:image" content="https://victordelrosal.github.io/CocoyMango/imagenes/preview.png">
  <meta property="og:title" content="Los Juegos de Coco y Mango">
  <meta property="og:description" content="¡Juega con Coco y Mango en 13 mini-juegos!">
  <meta property="og:url" content="https://cocoymango.net/juegos.html">
  <meta property="og:type" content="website">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap');

    * {
      font-family: 'Comic Neue', cursive;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .game-card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .game-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.15);
    }

    .game-card:active {
      transform: scale(0.98);
    }

    .play-btn {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      transition: all 0.2s ease;
    }

    .play-btn:hover {
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
      transform: scale(1.05);
    }

    .stars {
      color: #fbbf24;
    }

    /* Game container styles */
    .game-container {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #1a1a2e;
    }

    /* Prevent scroll during game */
    body.game-active {
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-gradient-to-b from-green-100 to-orange-100 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // Game metadata
    const games = [
      { id: 1, title: "El primer día de clases", type: "Calma", emoji: "⚡", color: "from-yellow-400 to-orange-400" },
      { id: 2, title: "El volcán", type: "Corredor", emoji: "🌋", color: "from-red-500 to-orange-500" },
      { id: 3, title: "Nieve", type: "Atrapar", emoji: "❄️", color: "from-blue-300 to-cyan-300" },
      { id: 4, title: "El cuervo y los primos", type: "Escondite", emoji: "🐦‍⬛", color: "from-gray-600 to-gray-800" },
      { id: 5, title: "Avión de papel", type: "Vuelo", emoji: "✈️", color: "from-sky-400 to-blue-500" },
      { id: 6, title: "Agua de coco y mango", type: "Servir", emoji: "🥥", color: "from-green-400 to-yellow-400" },
      { id: 7, title: "La alcantarilla", type: "Laberinto", emoji: "🕳️", color: "from-stone-500 to-stone-700" },
      { id: 8, title: "El papalote", type: "Balance", emoji: "🪁", color: "from-purple-400 to-pink-400" },
      { id: 9, title: "El tesoro perdido", type: "Puzzle", emoji: "🗺️", color: "from-amber-500 to-yellow-500" },
      { id: 10, title: "La carrera de barquitos", type: "Carrera", emoji: "⛵", color: "from-blue-400 to-teal-400" },
      { id: 11, title: "El día de San Patricio", type: "Buscar", emoji: "☘️", color: "from-green-500 to-emerald-500" },
      { id: 12, title: "La aventura al aeropuerto", type: "Tiempo", emoji: "🚌", color: "from-indigo-400 to-purple-500" },
      { id: 13, title: "El boleto número 13", type: "Atrapar", emoji: "🎫", color: "from-rose-400 to-red-500" },
    ];

    // ==================== SHARED GAME COMPONENTS ====================

    // Star rating display
    const StarRating = ({ stars, maxStars = 3 }) => (
      <div className="flex gap-1">
        {[...Array(maxStars)].map((_, i) => (
          <span key={i} className={`text-2xl ${i < stars ? 'stars' : 'text-gray-300'}`}>
            ★
          </span>
        ))}
      </div>
    );

    // Game wrapper component
    const GameWrapper = ({ game, onClose, children }) => {
      const [isPaused, setIsPaused] = useState(false);

      useEffect(() => {
        document.body.classList.add('game-active');
        return () => document.body.classList.remove('game-active');
      }, []);

      return (
        <div className="game-container flex flex-col">
          {/* Game header */}
          <div className="flex justify-between items-center p-3 bg-black/30 text-white">
            <button
              onClick={onClose}
              className="p-2 hover:bg-white/20 rounded-full"
            >
              <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" />
              </svg>
            </button>
            <h2 className="text-lg font-bold">{game.title}</h2>
            <button
              onClick={() => setIsPaused(!isPaused)}
              className="p-2 hover:bg-white/20 rounded-full"
            >
              {isPaused ? (
                <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M8 5v14l11-7z"/>
                </svg>
              ) : (
                <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
              )}
            </button>
          </div>

          {/* Game content */}
          <div className="flex-1 relative">
            {isPaused && (
              <div className="absolute inset-0 bg-black/70 flex items-center justify-center z-50">
                <div className="text-center text-white">
                  <p className="text-3xl mb-4">⏸️ Pausado</p>
                  <button
                    onClick={() => setIsPaused(false)}
                    className="px-6 py-3 bg-green-500 rounded-full text-xl font-bold hover:bg-green-600"
                  >
                    Continuar
                  </button>
                </div>
              </div>
            )}
            {React.cloneElement(children, { isPaused })}
          </div>
        </div>
      );
    };

    // Game end screen
    const GameEndScreen = ({ score, stars, onRestart, onExit, message }) => (
      <div className="absolute inset-0 bg-black/80 flex items-center justify-center z-50">
        <div className="bg-white rounded-2xl p-8 text-center max-w-sm mx-4">
          <p className="text-4xl mb-2">{stars >= 3 ? '🎉' : stars >= 2 ? '👏' : '👍'}</p>
          <p className="text-2xl font-bold mb-2">{message || '¡Bien hecho!'}</p>
          <p className="text-xl mb-4">Puntos: {score}</p>
          <StarRating stars={stars} />
          <div className="flex gap-4 mt-6 justify-center">
            <button
              onClick={onRestart}
              className="px-6 py-3 bg-green-500 text-white rounded-full font-bold hover:bg-green-600"
            >
              🔄 Otra vez
            </button>
            <button
              onClick={onExit}
              className="px-6 py-3 bg-gray-500 text-white rounded-full font-bold hover:bg-gray-600"
            >
              🏠 Salir
            </button>
          </div>
        </div>
      </div>
    );

    // Game intro screen
    const GameIntroScreen = ({ game, instructions, onStart }) => (
      <div className="absolute inset-0 bg-gradient-to-b from-green-400 to-green-600 flex items-center justify-center z-50">
        <div className="text-center text-white px-6">
          <p className="text-6xl mb-4">{game.emoji}</p>
          <h2 className="text-3xl font-bold mb-2">{game.title}</h2>
          <p className="text-xl mb-6 opacity-90">{instructions}</p>
          <button
            onClick={onStart}
            className="px-8 py-4 bg-white text-green-600 rounded-full text-2xl font-bold hover:bg-green-100 shadow-lg"
          >
            ¡Jugar!
          </button>
        </div>
      </div>
    );

    // ==================== GAME 6: AGUA DE COCO Y MANGO ====================

    // SVG Lizard customer with expressive face
    const LizardCustomer = ({ type, patience, status }) => {
      const isHappy = status === 'happy';
      const isAngry = patience < 30 && status !== 'happy';
      const bodyColor = type === 'coco' ? '#6B8E23' : '#8FBC8F';
      const bellyColor = type === 'coco' ? '#9ACD32' : '#B0E0A0';

      return (
        <svg viewBox="0 0 100 120" className="w-full h-full">
          {/* Body */}
          <ellipse cx="50" cy="65" rx="28" ry="32" fill={bodyColor} />
          <ellipse cx="50" cy="70" rx="20" ry="22" fill={bellyColor} />

          {/* Head */}
          <ellipse cx="50" cy="32" rx="22" ry="18" fill={bodyColor} />

          {/* Eyes */}
          <circle cx="40" cy="28" r="8" fill="white" />
          <circle cx="60" cy="28" r="8" fill="white" />
          {isHappy ? (
            <>
              <circle cx="41" cy="27" r="4.5" fill="#222" />
              <circle cx="61" cy="27" r="4.5" fill="#222" />
              <circle cx="42.5" cy="25.5" r="1.5" fill="white" />
              <circle cx="62.5" cy="25.5" r="1.5" fill="white" />
            </>
          ) : isAngry ? (
            <>
              <circle cx="40" cy="29" r="4" fill="#222" />
              <circle cx="60" cy="29" r="4" fill="#222" />
              {/* Angry eyebrows */}
              <line x1="32" y1="20" x2="44" y2="23" stroke="#222" strokeWidth="2.5" strokeLinecap="round" />
              <line x1="68" y1="20" x2="56" y2="23" stroke="#222" strokeWidth="2.5" strokeLinecap="round" />
            </>
          ) : (
            <>
              <circle cx="41" cy="28" r="4" fill="#222" />
              <circle cx="61" cy="28" r="4" fill="#222" />
              <circle cx="42" cy="26.5" r="1.3" fill="white" />
              <circle cx="62" cy="26.5" r="1.3" fill="white" />
            </>
          )}

          {/* Mouth */}
          {isHappy ? (
            <path d="M 38 40 Q 50 52 62 40" fill="none" stroke="#222" strokeWidth="2.5" strokeLinecap="round" />
          ) : isAngry ? (
            <path d="M 40 44 Q 50 38 60 44" fill="none" stroke="#222" strokeWidth="2" strokeLinecap="round" />
          ) : (
            <path d="M 40 41 Q 50 47 60 41" fill="none" stroke="#222" strokeWidth="2" strokeLinecap="round" />
          )}

          {/* Blush when happy */}
          {isHappy && (
            <>
              <circle cx="33" cy="38" r="5" fill="#FF9999" opacity="0.5" />
              <circle cx="67" cy="38" r="5" fill="#FF9999" opacity="0.5" />
            </>
          )}

          {/* Little arms */}
          <ellipse cx="24" cy="60" rx="6" ry="4" fill={bodyColor} transform="rotate(-20 24 60)" />
          <ellipse cx="76" cy="60" rx="6" ry="4" fill={bodyColor} transform="rotate(20 76 60)" />

          {/* Feet */}
          <ellipse cx="36" cy="96" rx="8" ry="4" fill={bodyColor} />
          <ellipse cx="64" cy="96" rx="8" ry="4" fill={bodyColor} />

          {/* Tail */}
          <path d="M 75 80 Q 90 85 95 75 Q 98 68 92 65" fill="none" stroke={bodyColor} strokeWidth="5" strokeLinecap="round" />

          {/* Happy stars when served */}
          {isHappy && (
            <>
              <text x="15" y="15" fontSize="14" className="animate-bounce">⭐</text>
              <text x="75" y="10" fontSize="12" className="animate-bounce">✨</text>
              <text x="50" y="8" fontSize="10" textAnchor="middle" fontWeight="bold" fill="#4CAF50">¡Gracias!</text>
              <circle cx="33" cy="38" r="5" fill="#FF9999" opacity="0.5" />
              <circle cx="67" cy="38" r="5" fill="#FF9999" opacity="0.5" />
            </>
          )}
        </svg>
      );
    };

    // Mini drink thought bubble shown above each customer
    const DrinkBubble = ({ type }) => {
      if (type === 'coco') {
        return (
          <svg viewBox="0 0 70 55" className="w-full h-full">
            {/* Bubble */}
            <rect x="2" y="2" rx="12" ry="12" width="66" height="40" fill="white" stroke="#D4A056" strokeWidth="2" />
            <polygon points="22,42 28,42 25,52" fill="white" stroke="#D4A056" strokeWidth="1.5" />
            {/* Coconut half */}
            <ellipse cx="24" cy="22" rx="12" ry="11" fill="#8B4513" />
            <ellipse cx="24" cy="20" rx="10" ry="8" fill="#A0522D" />
            <ellipse cx="24" cy="18" rx="7" ry="5" fill="#F5F5DC" />
            <ellipse cx="24" cy="18" rx="5" ry="3.5" fill="#E0F7FA" opacity="0.7" />
            {/* Straw */}
            <rect x="26" y="10" width="2.5" height="14" rx="1" fill="#FF6B6B" />
            {/* Label */}
            <text x="48" y="19" textAnchor="middle" fontSize="10" fontWeight="bold" fill="#5D4037">Agua</text>
            <text x="48" y="30" textAnchor="middle" fontSize="10" fontWeight="bold" fill="#5D4037">de Coco</text>
          </svg>
        );
      }
      return (
        <svg viewBox="0 0 70 55" className="w-full h-full">
          {/* Bubble */}
          <rect x="2" y="2" rx="12" ry="12" width="66" height="40" fill="white" stroke="#FFB300" strokeWidth="2" />
          <polygon points="22,42 28,42 25,52" fill="white" stroke="#FFB300" strokeWidth="1.5" />
          {/* Glass */}
          <path d="M 14 12 L 16 32 Q 16 34 19 34 L 29 34 Q 32 34 32 32 L 34 12 Z" fill="#FFF9C4" stroke="#FFB300" strokeWidth="1" />
          <path d="M 15 14 L 17 31 Q 17 33 19 33 L 29 33 Q 31 33 31 31 L 33 14 Z" fill="#FFB74D" opacity="0.85" />
          <ellipse cx="24" cy="12" rx="10" ry="3" fill="#FFF9C4" stroke="#FFB300" strokeWidth="1" />
          <ellipse cx="24" cy="12" rx="8" ry="2" fill="#FFB74D" />
          {/* Mango slice */}
          <path d="M 31 10 Q 38 7 40 12 Q 38 16 31 14 Z" fill="#FF9800" />
          {/* Straw */}
          <rect x="19" y="5" width="2.5" height="12" rx="1" fill="#4CAF50" />
          {/* Label */}
          <text x="52" y="19" textAnchor="middle" fontSize="10" fontWeight="bold" fill="#E65100">Agua</text>
          <text x="52" y="30" textAnchor="middle" fontSize="10" fontWeight="bold" fill="#E65100">de Mango</text>
        </svg>
      );
    };

    // Detailed drink SVG
    const DrinkSVG = ({ type }) => {
      if (type === 'coco') {
        return (
          <svg viewBox="0 0 80 100" className="w-full h-full">
            {/* Coconut */}
            <ellipse cx="40" cy="52" rx="30" ry="28" fill="#8B4513" />
            <ellipse cx="40" cy="50" rx="28" ry="26" fill="#A0522D" />
            {/* Coconut texture dots */}
            <circle cx="32" cy="42" r="3" fill="#6B3410" />
            <circle cx="42" cy="40" r="2.5" fill="#6B3410" />
            <circle cx="48" cy="44" r="2" fill="#6B3410" />
            {/* Cut top showing white inside */}
            <ellipse cx="40" cy="35" rx="20" ry="10" fill="#F5F5DC" />
            <ellipse cx="40" cy="34" rx="18" ry="8" fill="white" />
            {/* Water inside */}
            <ellipse cx="40" cy="35" rx="15" ry="6" fill="#E0F7FA" opacity="0.7" />
            {/* Straw */}
            <rect x="44" y="8" width="4" height="35" rx="2" fill="#FF6B6B" />
            <rect x="42" y="6" width="8" height="5" rx="2" fill="#FF6B6B" />
            {/* Little umbrella */}
            <path d="M 35 12 Q 28 8 24 14" fill="#FFD700" stroke="#FFA500" strokeWidth="1" />
            <line x1="35" y1="12" x2="35" y2="22" stroke="#8B4513" strokeWidth="1.5" />
            {/* Sparkle */}
            <text x="60" y="25" fontSize="10">✨</text>
            {/* Label */}
            <text x="40" y="90" textAnchor="middle" fontSize="13" fontWeight="bold" fill="#5D4037">Agua de Coco</text>
          </svg>
        );
      }
      return (
        <svg viewBox="0 0 80 100" className="w-full h-full">
          {/* Glass */}
          <path d="M 20 25 L 24 75 Q 24 80 30 80 L 50 80 Q 56 80 56 75 L 60 25 Z" fill="#FFF9C4" stroke="#FFB300" strokeWidth="1.5" />
          {/* Mango juice */}
          <path d="M 22 32 L 25 72 Q 25 77 30 77 L 50 77 Q 55 77 55 72 L 58 32 Z" fill="#FFB74D" opacity="0.9" />
          {/* Juice highlight */}
          <path d="M 26 35 L 27 55 Q 28 58 32 58 L 35 58 L 36 35 Z" fill="#FFCC80" opacity="0.5" />
          {/* Glass rim */}
          <ellipse cx="40" cy="25" rx="20" ry="5" fill="#FFF9C4" stroke="#FFB300" strokeWidth="1.5" />
          <ellipse cx="40" cy="25" rx="17" ry="3.5" fill="#FFB74D" />
          {/* Mango slice on rim */}
          <path d="M 55 20 Q 65 15 68 22 Q 65 28 55 25 Z" fill="#FF9800" />
          <path d="M 56 21 Q 63 17 65 22 Q 63 26 56 24 Z" fill="#FFB74D" />
          {/* Straw */}
          <rect x="32" y="5" width="4" height="28" rx="2" fill="#4CAF50" />
          <rect x="30" y="3" width="8" height="5" rx="2" fill="#4CAF50" />
          {/* Ice cubes suggestion */}
          <rect x="34" y="38" width="8" height="7" rx="2" fill="white" opacity="0.4" />
          <rect x="44" y="45" width="7" height="6" rx="2" fill="white" opacity="0.3" />
          {/* Sparkle */}
          <text x="62" y="12" fontSize="10">✨</text>
          {/* Label */}
          <text x="40" y="95" textAnchor="middle" fontSize="13" fontWeight="bold" fill="#E65100">Agua de Mango</text>
        </svg>
      );
    };

    const Game6AguaDeCoco = ({ isPaused, onGameEnd }) => {
      const [gameState, setGameState] = useState('intro'); // intro, playing, ended
      const [score, setScore] = useState(0);
      const [lives, setLives] = useState(3);
      const [customers, setCustomers] = useState([]);
      const [happyCustomers, setHappyCustomers] = useState([]); // Customers being served (happy animation)
      const [timeLeft, setTimeLeft] = useState(60);
      const [speed, setSpeed] = useState(3000);
      const [combo, setCombo] = useState(0);
      const [floatingTexts, setFloatingTexts] = useState([]);
      const gameRef = useRef(null);
      const customerIdRef = useRef(0);
      const floatIdRef = useRef(0);

      // Customer types
      const customerTypes = [
        { type: 'coco', color: 'from-amber-50 to-amber-100', border: 'border-amber-300', want: '¡Agua de coco!' },
        { type: 'mango', color: 'from-yellow-50 to-yellow-100', border: 'border-yellow-300', want: '¡Agua de mango!' },
      ];

      // Lizard names for variety
      const lizardNames = ['Pepe', 'Lola', 'Tito', 'Rosa', 'Paco', 'Lily', 'Beto', 'Ana', 'Chuy', 'Toña'];

      // Start game
      const startGame = () => {
        setGameState('playing');
        setScore(0);
        setLives(3);
        setTimeLeft(60);
        setSpeed(3000);
        setCustomers([]);
        setHappyCustomers([]);
        setCombo(0);
        setFloatingTexts([]);
      };

      // Add floating text
      const addFloatingText = (text, x, y, color) => {
        const id = floatIdRef.current++;
        setFloatingTexts(prev => [...prev, { id, text, x, y, color }]);
        setTimeout(() => {
          setFloatingTexts(prev => prev.filter(f => f.id !== id));
        }, 1000);
      };

      // Add new customer
      useEffect(() => {
        if (gameState !== 'playing' || isPaused) return;

        const addCustomer = () => {
          const type = customerTypes[Math.floor(Math.random() * customerTypes.length)];
          const name = lizardNames[Math.floor(Math.random() * lizardNames.length)];
          const newCustomer = {
            id: customerIdRef.current++,
            ...type,
            name,
            patience: 100,
            entering: true,
          };
          setCustomers(prev => [...prev.slice(-4), newCustomer]);
          // Remove entering animation
          setTimeout(() => {
            setCustomers(prev => prev.map(c => c.id === newCustomer.id ? { ...c, entering: false } : c));
          }, 300);
        };

        addCustomer();
        const interval = setInterval(addCustomer, speed);
        return () => clearInterval(interval);
      }, [gameState, isPaused, speed]);

      // Timer countdown
      useEffect(() => {
        if (gameState !== 'playing' || isPaused) return;

        const timer = setInterval(() => {
          setTimeLeft(prev => {
            if (prev <= 1) {
              setGameState('ended');
              return 0;
            }
            return prev - 1;
          });
        }, 1000);

        return () => clearInterval(timer);
      }, [gameState, isPaused]);

      // Customer patience decay
      useEffect(() => {
        if (gameState !== 'playing' || isPaused) return;

        const decay = setInterval(() => {
          setCustomers(prev => {
            const updated = prev.map(c => ({ ...c, patience: c.patience - 4 }));
            const expired = updated.filter(c => c.patience <= 0);

            if (expired.length > 0) {
              setCombo(0);
              setLives(l => {
                const newLives = l - expired.length;
                if (newLives <= 0) {
                  setGameState('ended');
                }
                return Math.max(0, newLives);
              });
            }

            return updated.filter(c => c.patience > 0);
          });
        }, 500);

        return () => clearInterval(decay);
      }, [gameState, isPaused]);

      // Increase speed over time
      useEffect(() => {
        if (gameState !== 'playing' || isPaused) return;

        const speedUp = setInterval(() => {
          setSpeed(prev => Math.max(1500, prev - 100));
        }, 5000);

        return () => clearInterval(speedUp);
      }, [gameState, isPaused]);

      // Clean up happy customers
      useEffect(() => {
        if (happyCustomers.length === 0) return;
        const timeout = setTimeout(() => {
          setHappyCustomers(prev => prev.slice(1));
        }, 800);
        return () => clearTimeout(timeout);
      }, [happyCustomers]);

      // Serve drink
      const serveDrink = (drinkType) => {
        if (gameState !== 'playing' || isPaused) return;

        const customerIndex = customers.findIndex(c => c.type === drinkType);

        if (customerIndex !== -1) {
          const served = customers[customerIndex];
          const newCombo = combo + 1;
          const comboBonus = newCombo >= 3 ? newCombo * 5 : 0;
          const points = 10 + comboBonus;

          setCombo(newCombo);
          setScore(prev => prev + points);

          // Add to happy customers for animation
          setHappyCustomers(prev => [...prev, { ...served, status: 'happy' }]);

          // Floating score text
          addFloatingText(
            comboBonus > 0 ? `+${points} COMBO x${newCombo}!` : `+${points}`,
            50, 50,
            comboBonus > 0 ? '#FF6B00' : '#4CAF50'
          );

          setCustomers(prev => prev.filter((_, i) => i !== customerIndex));
        } else if (customers.length > 0) {
          // Wrong serve
          setCombo(0);
          addFloatingText('¡Incorrecto!', 50, 50, '#F44336');
          setLives(prev => {
            const newLives = prev - 1;
            if (newLives <= 0) {
              setGameState('ended');
            }
            return Math.max(0, newLives);
          });
        }
      };

      // Calculate stars
      const getStars = () => {
        if (score >= 200) return 3;
        if (score >= 100) return 2;
        if (score >= 50) return 1;
        return 0;
      };

      // Intro screen
      if (gameState === 'intro') {
        return (
          <GameIntroScreen
            game={games[5]}
            instructions="¡Sirve agua de coco 🥥 o mango 🥭 a los clientes! Mira lo que piden y toca el botón correcto antes de que se vayan."
            onStart={startGame}
          />
        );
      }

      // End screen
      if (gameState === 'ended') {
        return (
          <GameEndScreen
            score={score}
            stars={getStars()}
            message={score >= 200 ? '¡Vendedor estrella!' : score >= 100 ? '¡Muy bien!' : '¡Buen intento!'}
            onRestart={startGame}
            onExit={onGameEnd}
          />
        );
      }

      // Patience bar color
      const patienceColor = (p) => {
        if (p > 60) return 'bg-green-400';
        if (p > 30) return 'bg-yellow-400';
        return 'bg-red-400';
      };

      // Playing
      return (
        <div ref={gameRef} className="h-full flex flex-col bg-gradient-to-b from-amber-200 via-orange-100 to-orange-200 relative overflow-hidden">
          {/* Floating score texts */}
          {floatingTexts.map(ft => (
            <div
              key={ft.id}
              className="absolute pointer-events-none z-30 font-bold text-xl animate-bounce"
              style={{
                left: `${ft.x}%`,
                top: `${ft.y}%`,
                color: ft.color,
                transform: 'translate(-50%, -50%)',
                animation: 'floatUp 1s ease-out forwards',
              }}
            >
              {ft.text}
            </div>
          ))}

          {/* Stats bar */}
          <div className="flex justify-between items-center p-3 bg-white/60 backdrop-blur-sm border-b border-amber-200">
            <div className="flex gap-1">
              {[...Array(3)].map((_, i) => (
                <span key={i} className={`text-xl transition-all ${i < lives ? 'scale-100' : 'scale-75 grayscale opacity-30'}`}>❤️</span>
              ))}
            </div>
            <div className="flex items-center gap-3">
              {combo >= 3 && (
                <span className="text-base font-bold text-orange-600 animate-pulse">
                  COMBO x{combo}!
                </span>
              )}
              <span className="text-2xl font-bold">⭐ {score}</span>
            </div>
            <div className={`text-2xl font-bold ${timeLeft <= 10 ? 'text-red-500 animate-pulse' : ''}`}>
              ⏱️ {timeLeft}s
            </div>
          </div>

          {/* Store counter / scene */}
          <div className="bg-amber-800/20 px-3 py-2 text-center">
            <div className="flex items-center justify-center gap-2">
              <span className="text-lg">🏪</span>
              <span className="font-bold text-amber-900">Puesto de Coco y Mango</span>
              <span className="text-lg">🌴</span>
            </div>
          </div>

          {/* Customer area */}
          <div className="flex-1 flex flex-col p-3 overflow-hidden">
            {/* Happy served customers (floating away) */}
            {happyCustomers.length > 0 && (
              <div className="absolute top-20 left-0 right-0 z-20 flex justify-center pointer-events-none">
                {happyCustomers.map(hc => (
                  <div key={hc.id} className="w-20 h-24" style={{ animation: 'floatUp 0.8s ease-out forwards' }}>
                    <LizardCustomer type={hc.type} patience={100} status="happy" />
                  </div>
                ))}
              </div>
            )}

            {/* Waiting customers */}
            <div className="bg-white/40 backdrop-blur-sm rounded-2xl p-3 shadow-inner flex-1 flex flex-col">
              <p className="text-center text-base mb-2 font-bold text-amber-800">
                Clientes esperando: {customers.length}
              </p>
              <div className="flex-1 flex flex-wrap justify-center items-start gap-2 content-start overflow-hidden">
                {customers.length === 0 ? (
                  <div className="flex flex-col items-center justify-center h-full opacity-50">
                    <span className="text-4xl mb-2">🦎</span>
                    <p className="text-amber-700">Esperando clientes...</p>
                  </div>
                ) : (
                  customers.map(customer => (
                    <div
                      key={customer.id}
                      className={`bg-gradient-to-b ${customer.color} border-2 ${customer.border} rounded-2xl p-1.5 text-center shadow-md transition-all w-[30%] sm:w-[23%] max-w-[120px]`}
                      style={{
                        transform: customer.entering ? 'translateY(20px) scale(0.8)' : 'translateY(0) scale(1)',
                        opacity: customer.entering ? 0.5 : 1,
                        animation: customer.patience < 30 ? 'shake 0.3s infinite' : 'none',
                      }}
                    >
                      {/* Drink thought bubble */}
                      <div className="w-full h-12 sm:h-14 -mb-1">
                        <DrinkBubble type={customer.type} />
                      </div>
                      {/* Lizard face */}
                      <div className="w-full h-16 sm:h-20">
                        <LizardCustomer type={customer.type} patience={customer.patience} status="waiting" />
                      </div>
                      {/* Name */}
                      <p className="text-sm font-bold truncate">{customer.name}</p>
                      {/* Patience bar */}
                      <div className="w-full bg-gray-200 rounded-full h-2.5 mt-0.5">
                        <div
                          className={`${patienceColor(customer.patience)} h-2.5 rounded-full transition-all duration-300`}
                          style={{ width: `${customer.patience}%` }}
                        />
                      </div>
                    </div>
                  ))
                )}
              </div>
            </div>
          </div>

          {/* Drink serving buttons */}
          <div className="p-4 bg-gradient-to-t from-amber-300/80 to-transparent backdrop-blur-sm">
            <p className="text-center mb-2 font-bold text-amber-900 text-base">¡Toca para servir!</p>
            <div className="flex gap-5 justify-center">
              <button
                onClick={() => serveDrink('coco')}
                className="flex-1 max-w-[170px] py-3 bg-gradient-to-b from-amber-300 to-amber-500 hover:from-amber-400 hover:to-amber-600 active:scale-90 rounded-2xl text-center shadow-lg transition-all border-2 border-amber-600"
              >
                <div className="w-20 h-20 mx-auto">
                  <DrinkSVG type="coco" />
                </div>
              </button>
              <button
                onClick={() => serveDrink('mango')}
                className="flex-1 max-w-[170px] py-3 bg-gradient-to-b from-yellow-300 to-yellow-500 hover:from-yellow-400 hover:to-yellow-600 active:scale-90 rounded-2xl text-center shadow-lg transition-all border-2 border-yellow-600"
              >
                <div className="w-20 h-20 mx-auto">
                  <DrinkSVG type="mango" />
                </div>
              </button>
            </div>
          </div>

          {/* CSS animations */}
          <style>{`
            @keyframes floatUp {
              0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
              100% { opacity: 0; transform: translate(-50%, -150%) scale(1.3); }
            }
            @keyframes shake {
              0%, 100% { transform: translateX(0); }
              25% { transform: translateX(-3px); }
              75% { transform: translateX(3px); }
            }
          `}</style>
        </div>
      );
    };

    // ==================== GAME 1: EL PRIMER DÍA DE CLASES ====================
    // "¿Qué fue ese ruido?" - Identify if it was thunder or something else

    const Game1PrimerDia = ({ isPaused, onGameEnd }) => {
      const [gameState, setGameState] = useState('intro'); // intro, playing, showing, feedback, ended
      const [score, setScore] = useState(0);
      const [lives, setLives] = useState(3);
      const [round, setRound] = useState(0);
      const [currentSound, setCurrentSound] = useState(null);
      const [options, setOptions] = useState([]);
      const [selectedAnswer, setSelectedAnswer] = useState(null);
      const [isCorrect, setIsCorrect] = useState(null);
      const [screenFlash, setScreenFlash] = useState(false);
      const [cocoState, setCocoState] = useState('normal'); // normal, scared, happy, sad
      const [mangoMessage, setMangoMessage] = useState('');
      const [visualHint, setVisualHint] = useState(null); // Shows what made the sound
      const [showHint, setShowHint] = useState(false);
      const audioContextRef = useRef(null);

      const totalRounds = 10;

      // Initialize audio context
      useEffect(() => {
        audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
        return () => {
          if (audioContextRef.current) {
            audioContextRef.current.close();
          }
        };
      }, []);

      // Sound synthesis functions using Web Audio API
      const playSound = (soundId) => {
        const ctx = audioContextRef.current;
        if (!ctx) return;

        // Resume context if suspended (browser autoplay policy)
        if (ctx.state === 'suspended') {
          ctx.resume();
        }

        const now = ctx.currentTime;

        switch (soundId) {
          case 'thunder': {
            // Thunder: Low rumble with noise burst
            const noise = ctx.createBufferSource();
            const bufferSize = ctx.sampleRate * 1.2;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
              data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.15));
            }
            noise.buffer = buffer;

            const lowpass = ctx.createBiquadFilter();
            lowpass.type = 'lowpass';
            lowpass.frequency.value = 150;

            const gain = ctx.createGain();
            gain.gain.setValueAtTime(1.5, now);
            gain.gain.exponentialDecayTo && gain.gain.exponentialDecayTo(0.01, now + 1.2);
            gain.gain.setValueAtTime(1.5, now);
            gain.gain.linearRampToValueAtTime(0.01, now + 1.2);

            noise.connect(lowpass).connect(gain).connect(ctx.destination);
            noise.start(now);
            noise.stop(now + 1.2);
            break;
          }
          case 'car': {
            // Car: Horn honk
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(350, now);
            osc.frequency.setValueAtTime(400, now + 0.1);
            gain.gain.setValueAtTime(0.4, now);
            gain.gain.setValueAtTime(0.4, now + 0.4);
            gain.gain.linearRampToValueAtTime(0, now + 0.5);
            osc.connect(gain).connect(ctx.destination);
            osc.start(now);
            osc.stop(now + 0.5);
            break;
          }
          case 'door': {
            // Door: Heavy thud
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(80, now);
            osc.frequency.exponentialRampToValueAtTime(40, now + 0.2);
            gain.gain.setValueAtTime(0.8, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.connect(gain).connect(ctx.destination);
            osc.start(now);
            osc.stop(now + 0.3);
            break;
          }
          case 'drum': {
            // Drum: Bass drum hit
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
            gain.gain.setValueAtTime(1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
            osc.connect(gain).connect(ctx.destination);
            osc.start(now);
            osc.stop(now + 0.4);
            // Add click
            const click = ctx.createOscillator();
            const clickGain = ctx.createGain();
            click.type = 'square';
            click.frequency.value = 200;
            clickGain.gain.setValueAtTime(0.3, now);
            clickGain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
            click.connect(clickGain).connect(ctx.destination);
            click.start(now);
            click.stop(now + 0.05);
            break;
          }
          case 'balloon': {
            // Balloon: Pop sound
            const noise = ctx.createBufferSource();
            const bufferSize = ctx.sampleRate * 0.15;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
              data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.1));
            }
            noise.buffer = buffer;
            const highpass = ctx.createBiquadFilter();
            highpass.type = 'highpass';
            highpass.frequency.value = 1000;
            const gain = ctx.createGain();
            gain.gain.setValueAtTime(0.8, now);
            noise.connect(highpass).connect(gain).connect(ctx.destination);
            noise.start(now);
            break;
          }
          case 'firework': {
            // Firework: Whistle then bang
            const whistle = ctx.createOscillator();
            const whistleGain = ctx.createGain();
            whistle.type = 'sine';
            whistle.frequency.setValueAtTime(800, now);
            whistle.frequency.linearRampToValueAtTime(2000, now + 0.3);
            whistleGain.gain.setValueAtTime(0.2, now);
            whistleGain.gain.linearRampToValueAtTime(0, now + 0.3);
            whistle.connect(whistleGain).connect(ctx.destination);
            whistle.start(now);
            whistle.stop(now + 0.3);
            // Bang
            setTimeout(() => {
              const noise = ctx.createBufferSource();
              const bufferSize = ctx.sampleRate * 0.3;
              const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
              const data = buffer.getChannelData(0);
              for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.15));
              }
              noise.buffer = buffer;
              const gain = ctx.createGain();
              gain.gain.value = 0.7;
              noise.connect(gain).connect(ctx.destination);
              noise.start();
            }, 350);
            break;
          }
          case 'truck': {
            // Truck: Deep engine rumble
            const osc1 = ctx.createOscillator();
            const osc2 = ctx.createOscillator();
            const gain = ctx.createGain();
            osc1.type = 'sawtooth';
            osc1.frequency.value = 60;
            osc2.type = 'sawtooth';
            osc2.frequency.value = 62;
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.linearRampToValueAtTime(0.4, now + 0.3);
            gain.gain.linearRampToValueAtTime(0.1, now + 0.8);
            gain.gain.linearRampToValueAtTime(0, now + 1);
            osc1.connect(gain);
            osc2.connect(gain);
            gain.connect(ctx.destination);
            osc1.start(now);
            osc2.start(now);
            osc1.stop(now + 1);
            osc2.stop(now + 1);
            break;
          }
          case 'book': {
            // Book: Slam/thud
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.exponentialRampToValueAtTime(60, now + 0.08);
            gain.gain.setValueAtTime(0.7, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.connect(gain).connect(ctx.destination);
            osc.start(now);
            osc.stop(now + 0.2);
            break;
          }
        }
      };

      // All possible sound sources with ADJACENT visual hints (not the answer!)
      const soundSources = [
        { id: 'thunder', emoji: '⚡', label: 'Trueno', isThunder: true, hint: '🌧️', hintLabel: 'Nubes de tormenta', hintBg: 'from-gray-800 to-purple-900' },
        { id: 'car', emoji: '🚗', label: 'Coche', isThunder: false, hint: '🛣️', hintLabel: 'La calle', hintBg: 'from-gray-600 to-gray-800' },
        { id: 'door', emoji: '🚪', label: 'Puerta', isThunder: false, hint: '🏠', hintLabel: 'Una casa', hintBg: 'from-amber-700 to-amber-900' },
        { id: 'drum', emoji: '🥁', label: 'Tambor', isThunder: false, hint: '🎵', hintLabel: 'Música', hintBg: 'from-red-600 to-red-800' },
        { id: 'balloon', emoji: '🎈', label: 'Globo', isThunder: false, hint: '🎉', hintLabel: 'Una fiesta', hintBg: 'from-pink-500 to-red-600' },
        { id: 'firework', emoji: '🎆', label: 'Cohete', isThunder: false, hint: '🌙', hintLabel: 'Cielo nocturno', hintBg: 'from-indigo-800 to-black' },
        { id: 'truck', emoji: '🚚', label: 'Camión', isThunder: false, hint: '📦', hintLabel: 'Cajas', hintBg: 'from-gray-700 to-gray-900' },
        { id: 'book', emoji: '📚', label: 'Libro', isThunder: false, hint: '📖', hintLabel: 'Leyendo', hintBg: 'from-amber-600 to-amber-800' },
      ];

      const mangoCorrectMessages = [
        '¡Muy bien! ¡Oíste y viste correctamente!',
        '¡Exacto! ¡El sonido coincidió con la imagen!',
        '¡Bien hecho! ¡Usaste tus oídos y ojos!',
        '¡Así se hace! Piensa antes de asustarte.',
        '¡Perfecto! ¡Eso era lo que escuchaste!',
        '¡Genial! No todo ruido fuerte es un trueno.',
      ];

      const mangoWrongMessages = [
        '¡Ups! Escucha y mira mejor la próxima.',
        'No te preocupes, sigue intentando.',
        'Tranquilo, ¡fíjate bien en la pista!',
        '¡Casi! Presta atención al sonido.',
      ];

      const startGame = () => {
        setGameState('playing');
        setScore(0);
        setLives(3);
        setRound(0);
        setCocoState('normal');
        nextRound(0);
      };

      const nextRound = (currentRound) => {
        if (currentRound >= totalRounds) {
          setGameState('ended');
          return;
        }

        // Randomly decide if this round has real thunder (30% chance)
        const hasThunder = Math.random() < 0.3;
        const correctAnswer = hasThunder
          ? soundSources.find(s => s.isThunder)
          : soundSources.filter(s => !s.isThunder)[Math.floor(Math.random() * (soundSources.length - 1))];

        // Create options: correct answer + 1 wrong one
        const wrongOptions = soundSources.filter(s => s.id !== correctAnswer.id);
        const wrongAnswer = wrongOptions[Math.floor(Math.random() * wrongOptions.length)];

        // Randomize order
        const opts = Math.random() > 0.5 ? [correctAnswer, wrongAnswer] : [wrongAnswer, correctAnswer];

        setCurrentSound(correctAnswer);
        setOptions(opts);
        setSelectedAnswer(null);
        setIsCorrect(null);
        setRound(currentRound + 1);
        setCocoState('scared');
        setMangoMessage('');

        // Show visual hint first
        setVisualHint(correctAnswer);
        setShowHint(true);
        setGameState('hint');

        // Play the sound
        playSound(correctAnswer.id);

        // Flash effect for thunder
        if (correctAnswer.isThunder) {
          setScreenFlash(true);
          setTimeout(() => setScreenFlash(false), 150);
          setTimeout(() => {
            setScreenFlash(true);
            setTimeout(() => setScreenFlash(false), 100);
          }, 250);
        }

        // Hide hint and show options after delay
        setTimeout(() => {
          setShowHint(false);
          setGameState('showing');
        }, 1500); // Show hint for 1.5 seconds
      };

      const handleAnswer = (answer) => {
        if (gameState !== 'showing' || isPaused) return;

        setSelectedAnswer(answer.id);
        const correct = answer.id === currentSound.id;
        setIsCorrect(correct);
        setGameState('feedback');

        if (correct) {
          setScore(prev => prev + 10);
          setCocoState('happy');
          setMangoMessage(mangoCorrectMessages[Math.floor(Math.random() * mangoCorrectMessages.length)]);
        } else {
          setLives(prev => prev - 1);
          setCocoState('sad');
          setMangoMessage(mangoWrongMessages[Math.floor(Math.random() * mangoWrongMessages.length)]);

          if (lives <= 1) {
            setTimeout(() => setGameState('ended'), 1500);
            return;
          }
        }

        // Move to next round after delay
        setTimeout(() => {
          if (lives > 1 || correct) {
            nextRound(round);
          }
        }, 1800);
      };

      const getStars = () => {
        if (lives === 0) return 0;
        if (score >= 80) return 3;
        if (score >= 50) return 2;
        if (score >= 20) return 1;
        return 0;
      };

      const getMessage = () => {
        if (lives === 0) return '¡Se acabaron las vidas!';
        if (score >= 80) return '¡Excelente! ¡Escuchas muy bien!';
        if (score >= 50) return '¡Muy bien! Estás aprendiendo.';
        return '¡Buen intento! Sigue practicando.';
      };

      // Intro screen
      if (gameState === 'intro') {
        return (
          <GameIntroScreen
            game={games[0]}
            instructions="👂 ¡Escucha el sonido, mira la pista, y adivina qué lo hizo!"
            onStart={startGame}
          />
        );
      }

      // End screen
      if (gameState === 'ended') {
        return (
          <GameEndScreen
            score={score}
            stars={getStars()}
            message={getMessage()}
            onRestart={startGame}
            onExit={onGameEnd}
          />
        );
      }

      // Game UI
      return (
        <div className="h-full flex flex-col bg-gradient-to-b from-blue-400 via-blue-300 to-green-600 relative overflow-hidden">
          {/* Lightning flash overlay */}
          {screenFlash && (
            <div className="absolute inset-0 bg-white/80 z-40 pointer-events-none" />
          )}

          {/* Visual hint overlay - shows a CLUE (not the answer!) */}
          {showHint && visualHint && (
            <div className={`absolute inset-0 z-50 flex items-center justify-center bg-gradient-to-b ${visualHint.hintBg}`}>
              <div className="text-center">
                <p className="text-xl sm:text-2xl font-bold text-white/70 mb-2" style={{ textShadow: '1px 1px 4px rgba(0,0,0,0.8)' }}>
                  👀 ¡Pista!
                </p>
                <span className="text-[100px] sm:text-[150px] block mb-2 drop-shadow-2xl animate-bounce" style={{ filter: 'drop-shadow(0 0 30px rgba(255,255,255,0.5))' }}>
                  {visualHint.hint}
                </span>
                <p className="text-2xl sm:text-3xl font-bold text-white/90 mb-4" style={{ textShadow: '2px 2px 6px rgba(0,0,0,0.8)' }}>
                  {visualHint.hintLabel}
                </p>
                <p className="text-xl sm:text-2xl text-yellow-300 animate-pulse" style={{ textShadow: '1px 1px 4px rgba(0,0,0,0.8)' }}>
                  🔊 ¡Escucha el sonido!
                </p>
              </div>
            </div>
          )}

          {/* Stats bar */}
          <div className="flex justify-between items-center p-3 bg-black/30 text-white z-10">
            <div className="flex gap-1">
              {[...Array(3)].map((_, i) => (
                <span key={i} className={`text-2xl ${i < lives ? '' : 'opacity-30 grayscale'}`}>❤️</span>
              ))}
            </div>
            <div className="text-xl font-bold">Ronda {round}/{totalRounds}</div>
            <div className="text-xl font-bold">⭐ {score}</div>
          </div>

          {/* Main game area */}
          <div className="flex-1 flex flex-col items-center justify-center p-4 relative">
            {/* Question prompt after hint */}
            {gameState === 'showing' && (
              <div className="absolute top-4 left-1/2 -translate-x-1/2 z-20">
                <p className="text-3xl sm:text-4xl font-bold text-white animate-bounce"
                  style={{ textShadow: '3px 3px 6px rgba(0,0,0,0.8)' }}>
                  🤔 ¿Qué fue?
                </p>
              </div>
            )}

            {/* Question + Replay button */}
            <div className="bg-white/90 rounded-2xl p-4 sm:p-6 shadow-xl mb-6 text-center max-w-md">
              <p className="text-xl sm:text-2xl font-bold text-gray-800 mb-2">
                🤔 ¿Qué hizo ese ruido?
              </p>
              <p className="text-base sm:text-lg text-gray-600 mb-3">
                ¡Usa la pista para adivinar!
              </p>
              {gameState === 'showing' && currentSound && (
                <button
                  onClick={() => playSound(currentSound.id)}
                  className="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-full text-sm font-bold transition-all active:scale-95"
                >
                  🔊 Escuchar otra vez
                </button>
              )}
            </div>

            {/* Coco - reacts to answers */}
            <div className="mb-6">
              <svg viewBox="0 0 100 120" className={`w-28 h-32 sm:w-36 sm:h-40 ${cocoState === 'scared' ? 'animate-[shake_0.3s_infinite]' : ''}`}>
                {/* Body */}
                <ellipse cx="50" cy="65" rx="28" ry="32" fill="#4CAF50" />
                <ellipse cx="50" cy="70" rx="20" ry="22" fill="#81C784" />
                {/* Head */}
                <ellipse cx="50" cy="32" rx="22" ry="18" fill="#4CAF50" />
                {/* Eyes */}
                <circle cx="40" cy="28" r="8" fill="white" />
                <circle cx="60" cy="28" r="8" fill="white" />
                {cocoState === 'scared' ? (
                  <>
                    <circle cx="40" cy="28" r="6" fill="#222" />
                    <circle cx="60" cy="28" r="6" fill="#222" />
                    <ellipse cx="50" cy="44" rx="6" ry="7" fill="#222" />
                    <path d="M 70 18 Q 73 13 74 20 Q 73 24 70 18" fill="#4FC3F7" />
                  </>
                ) : cocoState === 'happy' ? (
                  <>
                    <path d="M 34 28 Q 40 24 46 28" fill="none" stroke="#222" strokeWidth="2.5" strokeLinecap="round" />
                    <path d="M 54 28 Q 60 24 66 28" fill="none" stroke="#222" strokeWidth="2.5" strokeLinecap="round" />
                    <path d="M 38 42 Q 50 52 62 42" fill="none" stroke="#222" strokeWidth="2.5" strokeLinecap="round" />
                    <text x="15" y="15" fontSize="12">⭐</text>
                    <text x="78" y="15" fontSize="12">⭐</text>
                  </>
                ) : cocoState === 'sad' ? (
                  <>
                    <circle cx="40" cy="30" r="5" fill="#222" />
                    <circle cx="60" cy="30" r="5" fill="#222" />
                    <path d="M 38 46 Q 50 40 62 46" fill="none" stroke="#222" strokeWidth="2" strokeLinecap="round" />
                    <ellipse cx="32" cy="40" r="4" fill="#90CAF9" opacity="0.6" />
                    <ellipse cx="68" cy="40" r="4" fill="#90CAF9" opacity="0.6" />
                  </>
                ) : (
                  <>
                    <circle cx="41" cy="28" r="4.5" fill="#222" />
                    <circle cx="61" cy="28" r="4.5" fill="#222" />
                    <path d="M 40 42 Q 50 48 60 42" fill="none" stroke="#222" strokeWidth="2" strokeLinecap="round" />
                  </>
                )}
                {/* Backpack */}
                <rect x="18" y="50" width="14" height="18" rx="4" fill="#FF9800" />
                {/* Feet */}
                <ellipse cx="36" cy="96" rx="8" ry="4" fill="#4CAF50" />
                <ellipse cx="64" cy="96" rx="8" ry="4" fill="#4CAF50" />
              </svg>
            </div>

            {/* Answer options */}
            <div className="flex gap-4 sm:gap-6 justify-center w-full max-w-md">
              {options.map(opt => {
                const isSelected = selectedAnswer === opt.id;
                const showResult = gameState === 'feedback';
                const isCorrectAnswer = opt.id === currentSound?.id;

                let bgColor = 'bg-white hover:bg-gray-50 active:scale-95';
                if (showResult && isSelected) {
                  bgColor = isCorrect ? 'bg-green-400 scale-105' : 'bg-red-400 scale-95';
                } else if (showResult && isCorrectAnswer && !isCorrect) {
                  bgColor = 'bg-green-200';
                }

                return (
                  <button
                    key={opt.id}
                    onClick={() => handleAnswer(opt)}
                    disabled={gameState !== 'showing'}
                    className={`flex-1 py-5 sm:py-6 rounded-2xl shadow-lg transition-all ${bgColor} ${gameState !== 'showing' ? 'pointer-events-none' : ''}`}
                  >
                    <span className="text-5xl sm:text-6xl block mb-2">{opt.emoji}</span>
                    <span className="text-lg sm:text-xl font-bold text-gray-800">{opt.label}</span>
                  </button>
                );
              })}
            </div>

            {/* Mango's feedback */}
            {mangoMessage && (
              <div className="absolute bottom-4 right-4 flex items-end gap-2 z-30">
                <div className="bg-white rounded-xl p-3 shadow-lg border-2 border-orange-300 max-w-[200px]">
                  <p className="text-sm font-bold text-amber-800">{mangoMessage}</p>
                </div>
                <div className="text-4xl">🦎</div>
              </div>
            )}

            {/* Result feedback overlay */}
            {gameState === 'feedback' && (
              <div className="absolute top-1/3 left-1/2 -translate-x-1/2 z-30">
                <p className={`text-4xl sm:text-5xl font-bold ${isCorrect ? 'text-green-500' : 'text-red-500'}`}
                  style={{ textShadow: '2px 2px 4px rgba(0,0,0,0.3)' }}>
                  {isCorrect ? '¡Correcto! ✓' : '¡Incorrecto! ✗'}
                </p>
                {!isCorrect && currentSound && (
                  <p className="text-xl text-white text-center mt-2" style={{ textShadow: '1px 1px 2px rgba(0,0,0,0.5)' }}>
                    Era: {currentSound.emoji} {currentSound.label}
                  </p>
                )}
              </div>
            )}
          </div>

          {/* Ground */}
          <div className="h-[8%] bg-gradient-to-t from-green-800 to-green-700">
            <div className="flex justify-around pt-1">
              <span className="text-sm">🌸</span>
              <span className="text-sm">🌼</span>
              <span className="text-sm">🌺</span>
              <span className="text-sm">🌸</span>
              <span className="text-sm">🌼</span>
            </div>
          </div>

          <style>{`
            @keyframes shake {
              0%, 100% { transform: translateX(0); }
              25% { transform: translateX(-4px); }
              75% { transform: translateX(4px); }
            }
          `}</style>
        </div>
      );
    };

    // ==================== PLACEHOLDER FOR OTHER GAMES ====================

    const ComingSoonGame = ({ game, onClose }) => (
      <div className="h-full flex flex-col items-center justify-center bg-gradient-to-b from-gray-700 to-gray-900 text-white p-6">
        <p className="text-6xl mb-4">{game.emoji}</p>
        <h2 className="text-2xl font-bold mb-2">{game.title}</h2>
        <p className="text-xl opacity-70 mb-6">¡Próximamente!</p>
        <button
          onClick={onClose}
          className="px-6 py-3 bg-white text-gray-800 rounded-full font-bold hover:bg-gray-200"
        >
          Volver
        </button>
      </div>
    );

    // ==================== GAME CARD ====================

    const GameCard = ({ game, progress, onPlay }) => {
      const imgNum = String(game.id).padStart(2, '0');

      return (
        <div
          className="game-card bg-white rounded-2xl overflow-hidden shadow-lg cursor-pointer"
          onClick={onPlay}
        >
          <div className="relative">
            <img
              src={`imagenes/imagen${imgNum}.png`}
              alt={game.title}
              className="w-full h-32 sm:h-40 object-cover"
            />
            <div className={`absolute top-2 right-2 w-10 h-10 rounded-full bg-gradient-to-br ${game.color} flex items-center justify-center text-xl shadow`}>
              {game.emoji}
            </div>
            {progress?.stars > 0 && (
              <div className="absolute bottom-2 left-2 bg-black/50 rounded-full px-2 py-1">
                <StarRating stars={progress.stars} />
              </div>
            )}
          </div>
          <div className="p-3">
            <h3 className="font-bold text-sm sm:text-base truncate">{game.title}</h3>
            <p className="text-xs text-gray-500">{game.type}</p>
            <button className="play-btn w-full mt-2 py-2 text-white rounded-full font-bold text-sm">
              ▶ Jugar
            </button>
          </div>
        </div>
      );
    };

    // ==================== MAIN APP ====================

    const GamesApp = () => {
      const [currentGame, setCurrentGame] = useState(() => {
        // Check URL hash for direct game launch (e.g. juegos.html#game6)
        const hash = window.location.hash;
        const match = hash.match(/^#game(\d+)$/);
        return match ? parseInt(match[1]) : null;
      });
      const [progress, setProgress] = useState(() => {
        const saved = localStorage.getItem('cocoMangoGamesProgress');
        return saved ? JSON.parse(saved) : {};
      });

      // Save progress
      useEffect(() => {
        localStorage.setItem('cocoMangoGamesProgress', JSON.stringify(progress));
      }, [progress]);

      const handleGameEnd = (gameId, stars, score) => {
        if (stars !== undefined) {
          setProgress(prev => ({
            ...prev,
            [gameId]: {
              stars: Math.max(prev[gameId]?.stars || 0, stars),
              highScore: Math.max(prev[gameId]?.highScore || 0, score || 0),
            }
          }));
        }
        setCurrentGame(null);
      };

      // Render active game
      if (currentGame) {
        const game = games.find(g => g.id === currentGame);

        // Implemented games
        if (currentGame === 1) {
          return (
            <GameWrapper game={game} onClose={() => setCurrentGame(null)}>
              <Game1PrimerDia onGameEnd={() => handleGameEnd(1)} />
            </GameWrapper>
          );
        }

        if (currentGame === 6) {
          return (
            <GameWrapper game={game} onClose={() => setCurrentGame(null)}>
              <Game6AguaDeCoco onGameEnd={() => handleGameEnd(6)} />
            </GameWrapper>
          );
        }

        // Other games show coming soon
        return (
          <GameWrapper game={game} onClose={() => setCurrentGame(null)}>
            <ComingSoonGame game={game} onClose={() => setCurrentGame(null)} />
          </GameWrapper>
        );
      }

      // Games hub
      return (
        <div className="min-h-screen pb-8">
          {/* Header */}
          <header className="bg-gradient-to-r from-green-500 to-emerald-600 text-white p-4 shadow-lg">
            <div className="max-w-4xl mx-auto flex items-center justify-between">
              <div className="flex items-center gap-3">
                <a href="index.html" className="shrink-0 w-10 h-10 rounded-full overflow-hidden ring-2 ring-white/30 hover:ring-white/60 transition-all shadow-lg">
                  <img src="imagenes/preview.png" alt="Inicio" className="w-full h-full object-cover" />
                </a>
                <div>
                  <h1 className="text-xl sm:text-2xl font-bold">Los Juegos de Coco y Mango</h1>
                  <p className="text-sm opacity-90">13 mini-juegos basados en las historias</p>
                </div>
              </div>
              <a
                href="index.html"
                className="p-2 bg-white/20 hover:bg-white/30 rounded-full"
                title="Ver historias"
              >
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
              </a>
            </div>
          </header>

          {/* Games grid */}
          <main className="max-w-4xl mx-auto p-4">
            <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
              {games.map(game => (
                <GameCard
                  key={game.id}
                  game={game}
                  progress={progress[game.id]}
                  onPlay={() => setCurrentGame(game.id)}
                />
              ))}
            </div>
          </main>

          {/* Footer */}
          <footer className="text-center text-gray-500 text-sm mt-8">
            <a href="index.html" className="hover:text-green-600">📖 Leer las historias</a>
          </footer>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<GamesApp />);
  </script>
</body>
</html>
