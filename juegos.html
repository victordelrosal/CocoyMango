      const floatIdRef = useRef(0);
      const timerRef = useRef(null);
      const touchStartRef = useRef(null);

      const LANE_POSITIONS = [20, 50, 80]; // percentage positions for 3 lanes
      const PLAYER_Y = 70; // Player stays at 70% from top
      const GOAL_DISTANCE = 200; // meters to reach bus
      const BASE_SPEED = 0.8; // base movement speed

      // Obstacle types per PRD
      const OBSTACLE_TYPES = [
        { type: 'puddle', emoji: '💧', width: 14, height: 8, action: 'jump', penalty: 2 },
        { type: 'barrier', emoji: '🚧', width: 16, height: 12, action: 'jump', penalty: 3 },
        { type: 'sign', emoji: '🪧', width: 10, height: 16, action: 'slide', penalty: 2 },
        { type: 'cart', emoji: '🛒', width: 14, height: 14, action: 'dodge', penalty: 3 },
      ];

      // Powerup types
      const POWERUP_TYPES = [
        { type: 'clock', emoji: '⏰', effect: 'time', bonus: 5 },
        { type: 'sneakers', emoji: '👟', effect: 'speed', duration: 3000 },
      ];

      // Add floating text
      const addFloatingText = useCallback((text, x, y, color) => {
        const id = floatIdRef.current++;
        setFloatingTexts(prev => [...prev, { id, text, x, y, color }]);
        setTimeout(() => {
          setFloatingTexts(prev => prev.filter(f => f.id !== id));
        }, 1000);
      }, []);

      // Start game
      const startGame = () => {
        setGameState('playing');
        setTimeLeft(45);
        setDistance(0);
        setScore(0);
        setLane(1);
        setObstacles([]);
        setPowerups([]);
        setIsJumping(false);
        setIsSliding(false);
        setHasSpeedBoost(false);
        setInvulnerable(false);
        setBusLeaving(false);
        setFloatingTexts([]);
        lastTimeRef.current = 0;
        obstacleIdRef.current = 0;
        powerupIdRef.current = 0;
      };

      // Handle jump
      const handleJump = useCallback(() => {
        if (gameState !== 'playing' || isPaused || isJumping || isSliding) return;
        setIsJumping(true);
        setTimeout(() => setIsJumping(false), 400);
      }, [gameState, isPaused, isJumping, isSliding]);

      // Handle slide
      const handleSlide = useCallback(() => {
        if (gameState !== 'playing' || isPaused || isJumping || isSliding) return;
        setIsSliding(true);
        setTimeout(() => setIsSliding(false), 500);
      }, [gameState, isPaused, isJumping, isSliding]);

      // Handle dodge (lane change)
      const handleDodge = useCallback((direction) => {
        if (gameState !== 'playing' || isPaused) return;
        setLane(prev => {
          if (direction === 'left') return Math.max(0, prev - 1);
          if (direction === 'right') return Math.min(2, prev + 1);
          return prev;
        });
      }, [gameState, isPaused]);

      // Touch/mouse controls
      const handleTouchStart = useCallback((e) => {
        if (gameState !== 'playing' || isPaused) return;
        const touch = e.touches ? e.touches[0] : e;
        touchStartRef.current = { x: touch.clientX, y: touch.clientY, time: Date.now() };
      }, [gameState, isPaused]);

      const handleTouchEnd = useCallback((e) => {
        if (gameState !== 'playing' || isPaused || !touchStartRef.current) return;

        const touch = e.changedTouches ? e.changedTouches[0] : e;
        const deltaX = touch.clientX - touchStartRef.current.x;
        const deltaY = touch.clientY - touchStartRef.current.y;
        const deltaTime = Date.now() - touchStartRef.current.time;

        const swipeThreshold = 40;
        const tapThreshold = 15;

        if (Math.abs(deltaX) > swipeThreshold && Math.abs(deltaX) > Math.abs(deltaY)) {
          // Horizontal swipe - dodge
          handleDodge(deltaX > 0 ? 'right' : 'left');
        } else if (deltaY > swipeThreshold && Math.abs(deltaY) > Math.abs(deltaX)) {
          // Swipe down - slide
          handleSlide();
        } else if (deltaY < -swipeThreshold && Math.abs(deltaY) > Math.abs(deltaX)) {
          // Swipe up - jump
          handleJump();
        } else if (Math.abs(deltaX) < tapThreshold && Math.abs(deltaY) < tapThreshold && deltaTime < 300) {
          // Tap - jump
          handleJump();
        }

        touchStartRef.current = null;
      }, [gameState, isPaused, handleJump, handleSlide, handleDodge]);

      // Keyboard controls
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (gameState !== 'playing' || isPaused) return;

          switch(e.key) {
            case ' ':
            case 'ArrowUp':
              e.preventDefault();
              handleJump();
              break;
            case 'ArrowDown':
              e.preventDefault();
              handleSlide();
              break;
            case 'ArrowLeft':
              e.preventDefault();
              handleDodge('left');
              break;
            case 'ArrowRight':
              e.preventDefault();
              handleDodge('right');
              break;
          }
        };

        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [gameState, isPaused, handleJump, handleSlide, handleDodge]);

      // Timer countdown
      useEffect(() => {
        if (gameState !== 'playing' || isPaused) {
          if (timerRef.current) clearInterval(timerRef.current);
          return;
        }

        timerRef.current = setInterval(() => {
          setTimeLeft(prev => {
            if (prev <= 1) {
              // Time's up - lost
              setGameState('lost');
              return 0;
            }
            // Bus starts leaving at 10 seconds
            if (prev <= 11) {
              setBusLeaving(true);
            }
            return prev - 1;
          });
        }, 1000);

        return () => {
          if (timerRef.current) clearInterval(timerRef.current);
        };
      }, [gameState, isPaused]);

      // Spawn obstacles and powerups
      useEffect(() => {
        if (gameState !== 'playing' || isPaused) return;

        const spawnInterval = setInterval(() => {
          // Spawn obstacle
          if (Math.random() < 0.7) {
            const typeIndex = Math.floor(Math.random() * OBSTACLE_TYPES.length);
            const type = OBSTACLE_TYPES[typeIndex];
            const spawnLane = Math.floor(Math.random() * 3);

            const newObstacle = {
              id: obstacleIdRef.current++,
              ...type,
              lane: spawnLane,
              x: LANE_POSITIONS[spawnLane],
              y: -15,
              passed: false,
            };
            setObstacles(prev => [...prev, newObstacle]);
          }

          // Spawn powerup occasionally
          if (Math.random() < 0.15) {
            const typeIndex = Math.floor(Math.random() * POWERUP_TYPES.length);
            const type = POWERUP_TYPES[typeIndex];
            const spawnLane = Math.floor(Math.random() * 3);

            const newPowerup = {
              id: powerupIdRef.current++,
              ...type,
              lane: spawnLane,
              x: LANE_POSITIONS[spawnLane],
              y: -15,
              collected: false,
            };
            setPowerups(prev => [...prev, newPowerup]);
          }
        }, hasSpeedBoost ? 600 : 900);

        return () => clearInterval(spawnInterval);
      }, [gameState, isPaused, hasSpeedBoost]);

      // Game loop
      useEffect(() => {
        if (gameState !== 'playing' || isPaused) return;

        const gameLoop = (timestamp) => {
          if (!lastTimeRef.current) lastTimeRef.current = timestamp;
          const delta = timestamp - lastTimeRef.current;
          lastTimeRef.current = timestamp;

          const currentSpeed = hasSpeedBoost ? BASE_SPEED * 1.5 : BASE_SPEED;

          // Move obstacles down
          setObstacles(prev => {
            const updated = prev.map(obs => ({
              ...obs,
              y: obs.y + (currentSpeed * delta * 0.035),
            }));

            // Check collisions
            const playerLane = lane;
            const playerJumping = isJumping;
            const playerSliding = isSliding;
            const playerInvulnerable = invulnerable;

            updated.forEach(obs => {
              if (!obs.passed && obs.y > PLAYER_Y - 8 && obs.y < PLAYER_Y + 10) {
                if (obs.lane === playerLane && !playerInvulnerable) {
                  // Check if player avoided obstacle
                  let collision = false;

                  if (obs.action === 'jump' && !playerJumping) {
                    collision = true;
                  } else if (obs.action === 'slide' && !playerSliding) {
                    collision = true;
                  } else if (obs.action === 'dodge') {
                    collision = true; // Must dodge, not in same lane
                  }

                  if (collision) {
                    // Hit obstacle - time penalty
                    setTimeLeft(t => Math.max(1, t - obs.penalty));
                    addFloatingText(`-${obs.penalty}s`, LANE_POSITIONS[playerLane], PLAYER_Y - 10, '#ef4444');
                    setInvulnerable(true);
                    setTimeout(() => setInvulnerable(false), 800);
                    obs.passed = true;
                  }
                }

                // Successfully passed
                if (!obs.passed && obs.y > PLAYER_Y + 5) {
                  obs.passed = true;
                  setScore(s => s + 2);
                }
              }
            });

            return updated.filter(obs => obs.y < 115);
          });

          // Move powerups down
          setPowerups(prev => {
            const updated = prev.map(pw => ({
              ...pw,
              y: pw.y + (currentSpeed * delta * 0.035),
            }));

            // Check collection
            const playerLane = lane;

            updated.forEach(pw => {
              if (!pw.collected && pw.lane === playerLane &&
                  pw.y > PLAYER_Y - 10 && pw.y < PLAYER_Y + 10) {
                pw.collected = true;

                if (pw.effect === 'time') {
                  setTimeLeft(t => t + pw.bonus);
                  addFloatingText(`+${pw.bonus}s`, LANE_POSITIONS[playerLane], PLAYER_Y - 15, '#22c55e');
                } else if (pw.effect === 'speed') {
                  setHasSpeedBoost(true);
                  addFloatingText('¡RÁPIDO!', LANE_POSITIONS[playerLane], PLAYER_Y - 15, '#8b5cf6');
                  setTimeout(() => setHasSpeedBoost(false), pw.duration);
                }
              }
            });

            return updated.filter(pw => !pw.collected && pw.y < 115);
          });

          // Update distance
          setDistance(prev => {
            const newDist = prev + (currentSpeed * delta * 0.01);
            if (newDist >= GOAL_DISTANCE) {
              // Reached the bus!
              setGameState('won');
              return GOAL_DISTANCE;
            }
            return newDist;
          });

          // Animate street
          setStreetOffset(prev => (prev + currentSpeed * 2) % 40);

          frameRef.current = requestAnimationFrame(gameLoop);
        };

        frameRef.current = requestAnimationFrame(gameLoop);

        return () => {
          if (frameRef.current) cancelAnimationFrame(frameRef.current);
        };
      }, [gameState, isPaused, lane, isJumping, isSliding, invulnerable, hasSpeedBoost, addFloatingText]);

      // Cleanup
      useEffect(() => {
        return () => {
          if (frameRef.current) cancelAnimationFrame(frameRef.current);
          if (timerRef.current) clearInterval(timerRef.current);
        };
      }, []);

      // Calculate stars
      const getStars = () => {
        if (gameState === 'won') {
          const timeBonus = timeLeft * 2;
          const total = 50 + timeBonus + score;
          if (total >= 70) return 3;
          if (total >= 50) return 2;
          return 1;
        }
        // Lost
        if (score >= 30) return 1;
        return 0;
      };

      // Calculate final score
      const getFinalScore = () => {
        if (gameState === 'won') {
          return 50 + (timeLeft * 2) + score;
        }
        return score;
      };

      // Coco running sprite
      const CocoRunner = ({ jumping, sliding, invuln, speedBoost }) => (
        <svg viewBox="0 0 60 80" className={`w-full h-full ${invuln ? 'animate-pulse opacity-70' : ''}`}>
          {/* Speed lines when boosted */}
          {speedBoost && (
            <>
              <line x1="5" y1="30" x2="-10" y2="30" stroke="#8b5cf6" strokeWidth="2" opacity="0.6" />
              <line x1="5" y1="40" x2="-15" y2="40" stroke="#8b5cf6" strokeWidth="2" opacity="0.8" />
              <line x1="5" y1="50" x2="-12" y2="50" stroke="#8b5cf6" strokeWidth="2" opacity="0.6" />
            </>
          )}
          {/* Body */}
          <ellipse cx="30" cy={sliding ? 55 : 45} rx={sliding ? 18 : 14} ry={sliding ? 10 : 18} fill="#6B8E23" />
          <ellipse cx="30" cy={sliding ? 55 : 48} rx={sliding ? 14 : 10} ry={sliding ? 7 : 12} fill="#9ACD32" />
          {/* Head */}
          <ellipse cx={sliding ? 45 : 30} cy={sliding ? 50 : 25} rx={sliding ? 8 : 10} ry={sliding ? 6 : 8} fill="#6B8E23" />
          {/* Eyes */}
          <circle cx={sliding ? 48 : 27} cy={sliding ? 48 : 23} r="3" fill="white" />
          <circle cx={sliding ? 52 : 33} cy={sliding ? 48 : 23} r="3" fill="white" />
          <circle cx={sliding ? 49 : 28} cy={sliding ? 48 : 23} r="1.5" fill="#222" />
          <circle cx={sliding ? 53 : 34} cy={sliding ? 48 : 23} r="1.5" fill="#222" />
          {/* Smile */}
          <path d={sliding ? "M 46 52 Q 50 55 54 52" : "M 25 28 Q 30 32 35 28"} fill="none" stroke="#222" strokeWidth="1.5" strokeLinecap="round" />
          {/* Legs (running or sliding) */}
          {!sliding && (
            <>
              <ellipse cx={jumping ? 22 : 20} cy={jumping ? 70 : 65} rx="5" ry={jumping ? 8 : 5} fill="#6B8E23" />
              <ellipse cx={jumping ? 38 : 40} cy={jumping ? 70 : 65} rx="5" ry={jumping ? 8 : 5} fill="#6B8E23" />
            </>
          )}
          {/* Suitcase */}
          <rect x={sliding ? 10 : 42} y={sliding ? 45 : 35} width="12" height="10" rx="2" fill="#8B4513" />
          <rect x={sliding ? 13 : 45} y={sliding ? 43 : 33} width="6" height="3" rx="1" fill="#A0522D" />
        </svg>
      );

      // Intro screen
      if (gameState === 'intro') {
        return (
          <GameIntroScreen
            game={games[11]}
            instructions="¡Corre al aeropuerto! Salta, deslízate y esquiva los obstáculos. ¡No pierdas el autobús!"
            onStart={startGame}
          />
        );
      }

      // End screen
      if (gameState === 'won' || gameState === 'lost') {
        const message = gameState === 'won'
          ? '¡Llegaste al autobús!'
          : busLeaving
            ? '¡El autobús se fue sin ti!'
            : '¡Se acabó el tiempo!';

        return (
          <GameEndScreen
            score={getFinalScore()}
            stars={getStars()}
            message={message}
            onRestart={startGame}
            onExit={onGameEnd}
          />
        );
      }

      // Playing
      const progressPercent = (distance / GOAL_DISTANCE) * 100;
      const isLowTime = timeLeft <= 10;

      return (
        <div
          ref={gameRef}
          className={`h-full flex flex-col relative overflow-hidden select-none ${isLowTime ? 'animate-pulse' : ''}`}
          onTouchStart={handleTouchStart}
          onTouchEnd={handleTouchEnd}
          onMouseDown={handleTouchStart}
          onMouseUp={handleTouchEnd}
          style={{
            background: 'linear-gradient(to bottom, #87CEEB 0%, #B0E0E6 30%, #E0E0E0 60%, #808080 100%)',
          }}
        >
          {/* Red pulse overlay when time is low */}
          {isLowTime && (
            <div
              className="absolute inset-0 pointer-events-none z-40"
              style={{
                boxShadow: 'inset 0 0 80px rgba(255, 0, 0, 0.4)',
                animation: 'pulse 0.5s infinite',
              }}
            />
          )}

          {/* City skyline background */}
          <div className="absolute top-8 left-0 right-0 h-24 flex items-end justify-around pointer-events-none opacity-60">
            <div className="w-8 h-16 bg-gray-600 rounded-t" />
            <div className="w-12 h-24 bg-gray-500 rounded-t" />
            <div className="w-6 h-12 bg-gray-700 rounded-t" />
            <div className="w-10 h-20 bg-gray-600 rounded-t" />
            <div className="w-8 h-14 bg-gray-500 rounded-t" />
            <div className="w-14 h-22 bg-gray-600 rounded-t" />
            <div className="w-6 h-10 bg-gray-700 rounded-t" />
          </div>

          {/* Airport sign */}
          <div className="absolute top-16 right-4 bg-blue-600 text-white px-3 py-1 rounded text-sm font-bold shadow-lg z-10">
            ✈️ Aeropuerto →
          </div>

          {/* Bus at destination (visible near end) */}
          {distance > 150 && (
            <div
              className={`absolute right-4 text-6xl transition-all duration-1000 ${busLeaving ? 'translate-x-20 opacity-50' : ''}`}
              style={{ top: '15%' }}
            >
              🚌
              {!busLeaving && <span className="absolute -top-2 left-1/2 text-sm">¡Espérame!</span>}
            </div>
          )}

          {/* Stats bar */}
          <div className="flex justify-between items-center p-3 bg-black/40 text-white z-20">
            <div className={`text-xl font-bold ${isLowTime ? 'text-red-400 animate-pulse' : ''}`}>
              ⏱️ {timeLeft}s
            </div>
            <div className="flex-1 mx-4">
              <div className="h-3 bg-gray-700 rounded-full overflow-hidden">
                <div
                  className="h-full bg-gradient-to-r from-green-400 to-green-600 transition-all"
                  style={{ width: `${progressPercent}%` }}
                />
              </div>
              <div className="flex justify-between text-xs mt-1">
                <span>🏃 {Math.floor(distance)}m</span>
                <span>🚌 {GOAL_DISTANCE}m</span>
              </div>
            </div>
            <div className="text-lg font-bold">
              ⭐ {score}
              {hasSpeedBoost && <span className="ml-1 text-purple-400">⚡</span>}
            </div>
          </div>

          {/* Game area */}
          <div className="flex-1 relative">
            {/* Street with lane markers */}
            <div className="absolute inset-0 bg-gray-500">
              {/* Lane dividers */}
              <div className="absolute left-[35%] top-0 bottom-0 w-1 bg-yellow-400/60" style={{
                backgroundImage: 'repeating-linear-gradient(to bottom, #facc15 0px, #facc15 20px, transparent 20px, transparent 40px)',
                backgroundPosition: `0 ${streetOffset}px`,
              }} />
              <div className="absolute left-[65%] top-0 bottom-0 w-1 bg-yellow-400/60" style={{
                backgroundImage: 'repeating-linear-gradient(to bottom, #facc15 0px, #facc15 20px, transparent 20px, transparent 40px)',
                backgroundPosition: `0 ${streetOffset}px`,
              }} />
            </div>

            {/* Obstacles */}
            {obstacles.map(obs => (
              <div
                key={obs.id}
                className="absolute text-4xl transition-transform"
                style={{
                  left: `${obs.x}%`,
                  top: `${obs.y}%`,
                  transform: 'translate(-50%, -50%)',
                }}
              >
                {obs.emoji}
              </div>
            ))}

            {/* Powerups */}
            {powerups.map(pw => (
              <div
                key={pw.id}
                className="absolute text-3xl animate-bounce"
                style={{
                  left: `${pw.x}%`,
                  top: `${pw.y}%`,
                  transform: 'translate(-50%, -50%)',
                }}
              >
                {pw.emoji}
              </div>
            ))}

            {/* Player (Coco) */}
            <div
              className="absolute w-16 h-20 transition-all duration-100"
              style={{
                left: `${LANE_POSITIONS[lane]}%`,
                top: isJumping ? `${PLAYER_Y - 12}%` : `${PLAYER_Y}%`,
                transform: 'translate(-50%, -50%)',
              }}
            >
              <CocoRunner
                jumping={isJumping}
                sliding={isSliding}
                invuln={invulnerable}
                speedBoost={hasSpeedBoost}
              />
            </div>

            {/* Floating texts */}
            {floatingTexts.map(ft => (
              <div
                key={ft.id}
                className="absolute pointer-events-none z-30 font-bold text-xl"
                style={{
                  left: `${ft.x}%`,
                  top: `${ft.y}%`,
                  color: ft.color,
                  transform: 'translate(-50%, -50%)',
                  animation: 'floatUp 1s ease-out forwards',
                  textShadow: '2px 2px 4px rgba(0,0,0,0.5)',
                }}
              >
                {ft.text}
              </div>
            ))}
          </div>

          {/* Control hints */}
          <div className="h-16 bg-gradient-to-t from-indigo-700 to-indigo-600 flex items-center justify-around text-white text-sm font-bold px-4">
            <span>👆 Salta</span>
            <span>👇 Desliza</span>
            <span>👈👉 Esquiva</span>
          </div>

          {/* CSS Animations */}
          <style>{`
            @keyframes floatUp {
              0% { opacity: 1; transform: translate(-50%, -50%) translateY(0); }
              100% { opacity: 0; transform: translate(-50%, -50%) translateY(-40px); }
            }
          `}</style>
        </div>
      );
    };

    // ==================== GAME 13: EL BOLETO NÚMERO 13 ====================
    // Chase/catch: Tap the lottery ticket as it blows around unpredictably

    const Game13Boleto = ({ isPaused, onGameEnd }) => {
      const [gameState, setGameState] = useState('intro'); // intro, playing, ended
      const [round, setRound] = useState(1);
      const [roundTime, setRoundTime] = useState(15);
      const [score, setScore] = useState(0);
      const [catches, setCatches] = useState(0);
      const [ticketPos, setTicketPos] = useState({ x: 50, y: 50 });
      const [ticketVel, setTicketVel] = useState({ x: 0, y: 0 });
      const [ticketRotation, setTicketRotation] = useState(0);
      const [windDir, setWindDir] = useState({ x: 0, y: 0 });
      const [windStrength, setWindStrength] = useState(0);
      const [leaves, setLeaves] = useState([]);
      const [floatingTexts, setFloatingTexts] = useState([]);
      const [cocoReaction, setCocoReaction] = useState('watching'); // watching, excited, sad
      const [ticketGlowing, setTicketGlowing] = useState(false);

      const gameRef = useRef(null);
      const frameRef = useRef(null);
      const timerRef = useRef(null);
      const windTimerRef = useRef(null);
      const floatIdRef = useRef(0);
      const leafIdRef = useRef(0);
      const lastTimeRef = useRef(0);

      const TOTAL_ROUNDS = 5;
      const TIME_PER_ROUND = 15;
      const TICKET_SIZE = 60; // pixels for hit detection

      // Speed increases with rounds
      const getTicketSpeed = useCallback(() => {
        const baseSpeed = 1.5;
        return baseSpeed + (round - 1) * 0.4;
      }, [round]);

      // Add floating text
      const addFloatingText = useCallback((text, x, y, color) => {
        const id = floatIdRef.current++;
        setFloatingTexts(prev => [...prev, { id, text, x, y, color }]);
        setTimeout(() => {
          setFloatingTexts(prev => prev.filter(f => f.id !== id));
        }, 1200);
      }, []);

      // Spawn a leaf
      const spawnLeaf = useCallback(() => {
        const id = leafIdRef.current++;
        const startX = Math.random() * 100;
        const leaf = {
          id,
          x: startX,
          y: -5,
          rotation: Math.random() * 360,
          rotationSpeed: (Math.random() - 0.5) * 8,
          emoji: ['🍃', '🍂', '🌿'][Math.floor(Math.random() * 3)],
          size: 0.8 + Math.random() * 0.6,
        };
        setLeaves(prev => [...prev, leaf]);
      }, []);

      // Start a new round
      const startRound = useCallback(() => {
        setRoundTime(TIME_PER_ROUND);
        // Random starting position for ticket
        setTicketPos({
          x: 30 + Math.random() * 40,
          y: 30 + Math.random() * 30,
        });
        setTicketVel({
          x: (Math.random() - 0.5) * 2,
          y: (Math.random() - 0.5) * 2,
        });
        setTicketRotation(Math.random() * 30 - 15);
        setCocoReaction('watching');
        setTicketGlowing(false);
      }, []);

      // Start game
      const startGame = () => {
        setGameState('playing');
        setRound(1);
        setScore(0);
        setCatches(0);
        setLeaves([]);
        setFloatingTexts([]);
        setWindStrength(0);
        setWindDir({ x: 0, y: 0 });
        lastTimeRef.current = 0;
        startRound();
      };

      // Handle catching the ticket
      const handleCatch = useCallback((e) => {
        if (gameState !== 'playing' || isPaused) return;

        const rect = gameRef.current?.getBoundingClientRect();
        if (!rect) return;

        // Get tap position
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;

        const tapX = ((clientX - rect.left) / rect.width) * 100;
        const tapY = ((clientY - rect.top) / rect.height) * 100;

        // Calculate ticket bounds (as percentage of screen)
        const ticketWidthPct = (TICKET_SIZE / rect.width) * 100;
        const ticketHeightPct = (TICKET_SIZE / rect.height) * 100;

        const hitLeft = ticketPos.x - ticketWidthPct / 2;
        const hitRight = ticketPos.x + ticketWidthPct / 2;
        const hitTop = ticketPos.y - ticketHeightPct / 2;
        const hitBottom = ticketPos.y + ticketHeightPct / 2;

        const isHit = tapX >= hitLeft && tapX <= hitRight && tapY >= hitTop && tapY <= hitBottom;

        if (isHit) {
          // Caught the ticket!
          const timeBonus = Math.max(0, 20 - (TIME_PER_ROUND - roundTime));
          const roundBonus = 10;
          const perfectBonus = roundTime > 10 ? 5 : 0;
          const totalPoints = timeBonus + roundBonus + perfectBonus;

          setScore(prev => prev + totalPoints);
          setCatches(prev => prev + 1);
          addFloatingText(`+${totalPoints}`, ticketPos.x, ticketPos.y - 10, '#22c55e');
          setCocoReaction('excited');
          setTicketGlowing(true);

          // Next round or end game
          setTimeout(() => {
            if (round >= TOTAL_ROUNDS) {
              setGameState('ended');
            } else {
              setRound(prev => prev + 1);
              startRound();
            }
          }, 800);
        } else {
          // Near miss detection - check if within 1.5x the ticket size
          const nearMissMargin = 1.5;
          const nearLeft = ticketPos.x - (ticketWidthPct * nearMissMargin) / 2;
          const nearRight = ticketPos.x + (ticketWidthPct * nearMissMargin) / 2;
          const nearTop = ticketPos.y - (ticketHeightPct * nearMissMargin) / 2;
          const nearBottom = ticketPos.y + (ticketHeightPct * nearMissMargin) / 2;

          const isNearMiss = tapX >= nearLeft && tapX <= nearRight && tapY >= nearTop && tapY <= nearBottom;

          if (isNearMiss) {
            // Near miss - ticket zooms away
            addFloatingText('¡Casi!', tapX, tapY, '#f59e0b');
            setCocoReaction('sad');

            // Calculate direction away from tap
            const awayX = ticketPos.x - tapX;
            const awayY = ticketPos.y - tapY;
            const magnitude = Math.sqrt(awayX * awayX + awayY * awayY) || 1;

            setTicketVel({
              x: (awayX / magnitude) * getTicketSpeed() * 4,
              y: (awayY / magnitude) * getTicketSpeed() * 4,
            });
          }
        }
      }, [gameState, isPaused, ticketPos, roundTime, round, addFloatingText, startRound, getTicketSpeed]);

      // Timer countdown
      useEffect(() => {
        if (gameState !== 'playing' || isPaused) {
          if (timerRef.current) clearInterval(timerRef.current);
          return;
        }

        timerRef.current = setInterval(() => {
          setRoundTime(prev => {
            if (prev <= 1) {
              // Time's up for this round
              addFloatingText('¡Tiempo!', 50, 50, '#ef4444');
              setCocoReaction('sad');

              setTimeout(() => {
                if (round >= TOTAL_ROUNDS) {
                  setGameState('ended');
                } else {
                  setRound(r => r + 1);
                  startRound();
                }
              }, 800);

              return 0;
            }
            return prev - 1;
          });
        }, 1000);

        return () => {
          if (timerRef.current) clearInterval(timerRef.current);
        };
      }, [gameState, isPaused, round, addFloatingText, startRound]);

      // Wind gusts
      useEffect(() => {
        if (gameState !== 'playing' || isPaused) {
          if (windTimerRef.current) clearInterval(windTimerRef.current);
          return;
        }

        const triggerWind = () => {
          const newDir = {
            x: (Math.random() - 0.5) * 2,
            y: (Math.random() - 0.5) * 2,
          };
          const magnitude = Math.sqrt(newDir.x * newDir.x + newDir.y * newDir.y);
          setWindDir({
            x: newDir.x / magnitude,
            y: newDir.y / magnitude,
          });
          setWindStrength(0.5 + Math.random() * 1.5 + round * 0.2);

          // Spawn leaves with wind
          for (let i = 0; i < 3 + round; i++) {
            setTimeout(() => spawnLeaf(), i * 200);
          }

          // Wind fades after 1-2 seconds
          setTimeout(() => {
            setWindStrength(0);
          }, 1000 + Math.random() * 1000);
        };

        // Initial gust
        setTimeout(triggerWind, 1000);

        // Periodic gusts
        windTimerRef.current = setInterval(triggerWind, 2500 + Math.random() * 1500);

        return () => {
          if (windTimerRef.current) clearInterval(windTimerRef.current);
        };
      }, [gameState, isPaused, round, spawnLeaf]);

      // Game loop - ticket movement
      useEffect(() => {
        if (gameState !== 'playing' || isPaused || ticketGlowing) return;

        const gameLoop = (timestamp) => {
          if (!lastTimeRef.current) lastTimeRef.current = timestamp;
          const delta = Math.min(timestamp - lastTimeRef.current, 50); // Cap delta to prevent huge jumps
          lastTimeRef.current = timestamp;

          const speed = getTicketSpeed();
          const deltaFactor = delta * 0.06;

          // Update ticket velocity with wind and random flutter
          setTicketVel(prev => {
            let newVx = prev.x;
            let newVy = prev.y;

            // Apply wind
            if (windStrength > 0) {
              newVx += windDir.x * windStrength * deltaFactor * 0.3;
              newVy += windDir.y * windStrength * deltaFactor * 0.3;
            }

            // Random flutter
            newVx += (Math.random() - 0.5) * deltaFactor * 0.5;
            newVy += (Math.random() - 0.5) * deltaFactor * 0.5;

            // Apply friction
            newVx *= 0.98;
            newVy *= 0.98;

            // Add base drift
            if (Math.abs(newVx) < 0.3) newVx += (Math.random() - 0.5) * speed * 0.5;
            if (Math.abs(newVy) < 0.3) newVy += (Math.random() - 0.5) * speed * 0.5;

            // Clamp velocity
            const maxVel = speed * 3;
            newVx = Math.max(-maxVel, Math.min(maxVel, newVx));
            newVy = Math.max(-maxVel, Math.min(maxVel, newVy));

            return { x: newVx, y: newVy };
          });

          // Update ticket position
          setTicketPos(prev => {
            let newX = prev.x + ticketVel.x * deltaFactor;
            let newY = prev.y + ticketVel.y * deltaFactor;

            // Bounce off edges
            if (newX < 10 || newX > 90) {
              setTicketVel(v => ({ ...v, x: -v.x * 0.8 }));
              newX = Math.max(10, Math.min(90, newX));
            }
            if (newY < 10 || newY > 75) { // Leave room for Coco/Mango at bottom
              setTicketVel(v => ({ ...v, y: -v.y * 0.8 }));
              newY = Math.max(10, Math.min(75, newY));
            }

            return { x: newX, y: newY };
          });

          // Update ticket rotation based on velocity
          setTicketRotation(prev => {
            const targetRotation = ticketVel.x * 10;
            return prev + (targetRotation - prev) * 0.1;
          });

          // Update leaves
          setLeaves(prev => {
            return prev
              .map(leaf => ({
                ...leaf,
                x: leaf.x + windDir.x * windStrength * deltaFactor * 0.5 + (Math.random() - 0.5) * 0.3,
                y: leaf.y + 0.5 + windDir.y * windStrength * deltaFactor * 0.2,
                rotation: leaf.rotation + leaf.rotationSpeed,
              }))
              .filter(leaf => leaf.y < 110);
          });

          frameRef.current = requestAnimationFrame(gameLoop);
        };

        frameRef.current = requestAnimationFrame(gameLoop);

        return () => {
          if (frameRef.current) cancelAnimationFrame(frameRef.current);
        };
      }, [gameState, isPaused, ticketGlowing, ticketVel, windDir, windStrength, getTicketSpeed]);

      // Cleanup
      useEffect(() => {
        return () => {
          if (frameRef.current) cancelAnimationFrame(frameRef.current);
          if (timerRef.current) clearInterval(timerRef.current);
          if (windTimerRef.current) clearInterval(windTimerRef.current);

      // Intro screen
      if (gameState === 'intro') {

          <GameIntroScreen
            game={games[12]}
            instructions="¡Atrapa el boleto número 13! Toca el boleto antes de que se vuele. ¡Cuidado con el viento!"

          />

      }

      // End screen
      if (gameState === 'ended') {
        const message = catches === TOTAL_ROUNDS
          ? '¡Atrapaste todos los boletos!'
          : catches > 0
            ? `¡Atrapaste ${catches} de ${TOTAL_ROUNDS} boletos!`
            : '¡El boleto se escapó!';

        return (
          <GameEndScreen
            score={score}
            stars={getStars()}
            message={message}
            onRestart={startGame}
            onExit={onGameEnd}
          />
        );
      }

      // Playing
      const isLowTime = roundTime <= 5;

      return (
        <div

          className="h-full flex flex-col relative overflow-hidden select-none touch-none"
          onTouchStart={handleCatch}
          onMouseDown={handleCatch}
          style={{

        >

          {windStrength > 0 && (

        }

        if (currentGame === 13) {
          return (
            <GameWrapper game={game} onClose={() => setCurrentGame(null)}>
              <Game13Boleto onGameEnd={() => handleGameEnd(13)} />
            </GameWrapper>
          );
        }

        // Other games show coming soon
        return (
          <GameWrapper game={game} onClose={() => setCurrentGame(null)}>
            <ComingSoonGame game={game} onClose={() => setCurrentGame(null)} />
          </GameWrapper>
        );
      }

      // Games hub
      return (
        <div className="min-h-screen pb-8">
          {/* Header */}
          <header className="bg-gradient-to-r from-green-500 to-emerald-600 text-white p-4 shadow-lg">
            <div className="max-w-4xl mx-auto flex items-center justify-between">
              <div className="flex items-center gap-3">
                <a href="index.html" className="shrink-0 w-10 h-10 rounded-full overflow-hidden ring-2 ring-white/30 hover:ring-white/60 transition-all shadow-lg">
                  <img src="imagenes/preview.png" alt="Inicio" className="w-full h-full object-cover" />
                </a>
                <div>
                  <h1 className="text-xl sm:text-2xl font-bold">Los Juegos de Coco y Mango</h1>
                  <p className="text-sm opacity-90">13 mini-juegos basados en las historias</p>
                </div>
              </div>
              <a
                href="index.html"
                className="p-2 bg-white/20 hover:bg-white/30 rounded-full"
                title="Ver historias"
              >
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
              </a>
            </div>
          </header>

          {/* Games grid */}
          <main className="max-w-4xl mx-auto p-4">
            <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
              {games.map(game => (
                <GameCard
                  key={game.id}
                  game={game}
                  progress={progress[game.id]}
                  onPlay={() => setCurrentGame(game.id)}
                />
              ))}
            </div>
          </main>

          {/* Footer */}
          <footer className="text-center text-gray-500 text-sm mt-8">
            <a href="index.html" className="hover:text-green-600">📖 Leer las historias</a>
          </footer>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<GamesApp />);
  </script>
</body>
</html>
